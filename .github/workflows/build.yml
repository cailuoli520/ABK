name: 内核构建流程

permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      # ==================== 基础配置 ====================
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string

      # ==================== KernelSU 配置 ====================
      ksu_variant:
        required: true
        type: string
      ksu_branch:
        required: true
        type: string

      # ==================== 可选配置 ====================
      custom_ref:
        required: false
        type: string
      version:
        required: false
        type: string
      revision:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"

      # ==================== 功能开关 ====================
      use_zram:
        required: false
        type: boolean
        default: true
      use_bbg:
        required: false
        type: boolean
        default: true
      use_ddk:
        required: false
        type: boolean
        default: false
      use_ntsync:
        required: false
        type: boolean
        default: true
      use_networking:
        required: false
        type: boolean
        default: true
      use_kpm:
        required: false
        type: boolean
        default: true
      use_rekernel:
        required: false
        type: boolean
        default: false
      enable_susfs:
        required: false
        type: boolean
        default: true
      supp_op:
        required: false
        type: boolean
        default: false
      virtualization_support:
        required: false
        type: string
        default: "off"

      # ==================== ZRAM 扩展选项 ====================
      zram_full_algo:
        required: false
        type: boolean
        default: false
      zram_extra_algos:
        required: false
        type: string
        default: ""

      # ==================== KPM 扩展选项 ====================
      kpm_password:
        required: false
        type: string
        default: ""

      # ==================== 自定义外部模块 ====================
      use_custom_external_modules:
        required: false
        type: boolean
        default: false
      custom_external_modules:
        required: false
        type: string
        default: ""
      manager_package:
        required: false
        type: string
        default: ""
      manager_cert_size:
        required: false
        type: string
        default: ""
      manager_cert_sha256:
        required: false
        type: string
        default: ""
      upload_aux_artifacts:
        required: false
        type: boolean
        default: true

jobs:
  build-kernel:
    name: "${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.android_version }}-${{ inputs.os_patch_level }}-${{ inputs.ksu_variant }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: 构建信息摘要
        shell: bash
        run: |
          set -euo pipefail

          effective_use_zram="${{ inputs.use_zram }}"
          effective_zram_full_algo="${{ inputs.zram_full_algo }}"
          effective_zram_extra_algos="${{ inputs.zram_extra_algos || '' }}"

          if [ "${{ inputs.kernel_version }}" = "6.12" ]; then
            if [ "$effective_use_zram" = "true" ] || [ "$effective_zram_full_algo" = "true" ] || [ -n "$effective_zram_extra_algos" ]; then
              echo "::warning::Android16/6.12 暂不支持当前 ZRAM LZ4K 补丁栈，已强制关闭 ZRAM 增强和算法配置。"
            fi
            effective_use_zram="false"
            effective_zram_full_algo="false"
            effective_zram_extra_algos=""
          fi

          {
            echo "EFFECTIVE_USE_ZRAM=$effective_use_zram"
            echo "EFFECTIVE_ZRAM_FULL_ALGO=$effective_zram_full_algo"
            echo "EFFECTIVE_ZRAM_EXTRA_ALGOS=$effective_zram_extra_algos"
          } >> "$GITHUB_ENV"

          effective_ksu_branch="${{ inputs.ksu_branch }}"
          if [ "$effective_ksu_branch" = "SUSFS(自动)" ]; then
            effective_ksu_branch="Stable(标准)"
          fi
          echo "EFFECTIVE_KSU_BRANCH=$effective_ksu_branch" >> "$GITHUB_ENV"

          zram_extra_label="${effective_zram_extra_algos:-无}"

          echo "========================================"
          echo "       内核构建配置摘要"
          echo "========================================"
          echo "Android 版本  : ${{ inputs.android_version }}"
          echo "内核版本      : ${{ inputs.kernel_version }}"
          echo "子版本号      : ${{ inputs.sub_level }}"
          echo "补丁级别      : ${{ inputs.os_patch_level }}"
          echo "KSU 变体      : ${{ inputs.ksu_variant }}"
          echo "KSU 分支      : $effective_ksu_branch"
          echo "管理器包名    : ${{ inputs.manager_package || 'app/signing/abk-manager-cert.env' }}"
          echo "构建时间      : ${{ inputs.build_time }}"
          echo "SUSFS 状态    : ${{ inputs.enable_susfs }}"
          echo "ZRAM 增强     : $effective_use_zram"
          echo "ZRAM 完整算法 : $effective_zram_full_algo"
          echo "ZRAM 额外算法 : $zram_extra_label"
          echo "BBG 补丁      : ${{ inputs.use_bbg }}"
          echo "DDK LSM       : ${{ inputs.use_ddk }}"
          echo "NTsync 补丁   : ${{ inputs.use_ntsync }}"
          echo "Networing 增强: ${{ inputs.use_networking }}"
          echo "KPM 功能      : ${{ inputs.use_kpm }}"
          echo "KPM 密码      : ${{ inputs.kpm_password && '已自定义' || '默认' }}"
          echo "Re-Kernel     : ${{ inputs.use_rekernel }}"
          echo "虚拟化支持   : ${{ inputs.virtualization_support }}"
          echo "自定义注入    : ${{ inputs.use_custom_external_modules }}"
          echo "Stock Config  : 自动检测 config/stock_defconfig"
          echo "========================================"

      - name: 校验自定义内核版本组合
        shell: bash
        run: |
          set -euo pipefail

          android_version="${{ inputs.android_version }}"
          kernel_version="${{ inputs.kernel_version }}"
          sub_level="${{ inputs.sub_level }}"
          os_patch_level="${{ inputs.os_patch_level }}"
          combo="${android_version}-${kernel_version}"

          case "$combo" in
            android12-5.10|android13-5.15|android14-6.1|android15-6.6|android16-6.12) ;;
            *)
              echo "::error::不支持的 Android/内核组合: ${android_version}/${kernel_version}"
              echo "::error::当前工作流支持: android12/5.10, android13/5.15, android14/6.1, android15/6.6, android16/6.12"
              exit 1
              ;;
          esac

          if [ "${{ inputs.use_kpm }}" = "true" ] \
            && [ "${{ inputs.ksu_variant }}" = "Official" ]; then
            echo "::error::Official / KernelSU 变体不支持 KPM，请关闭 KPM 后重试。"
            exit 1
          fi

          if [ "${{ inputs.use_kpm }}" = "true" ] \
            && [ "${{ inputs.ksu_variant }}" = "ReSukiSU" ] \
            && { [ "${{ inputs.ksu_branch }}" = "Dev(开发)" ] || [ "${{ inputs.ksu_branch }}" = "Latest(最新)" ]; }; then
            echo "::error::ReSukiSU 仅 Stable(标准) / Custom(自定义) 支持 KPM，请切换分支或关闭 KPM。"
            exit 1
          fi

          if [ "$sub_level" = "X" ] || [ "$os_patch_level" = "lts" ]; then
            if [ "$sub_level" = "X" ] && [ "$os_patch_level" = "lts" ]; then
              echo "LTS 构建组合校验通过: ${combo}.${sub_level}-${os_patch_level}"
              exit 0
            fi
            echo "::error::LTS 构建必须同时使用 sub_level=X 和 os_patch_level=lts"
            exit 1
          fi

          KNOWN_KERNEL_PAIRS=$(cat <<'EOF'
          android12 5.10 43 2021-08
          android12 5.10 43 2021-09
          android12 5.10 43 2021-10
          android12 5.10 66 2021-11
          android12 5.10 66 2021-12
          android12 5.10 66 2022-01
          android12 5.10 81 2022-02
          android12 5.10 81 2022-03
          android12 5.10 101 2022-04
          android12 5.10 101 2022-05
          android12 5.10 110 2022-06
          android12 5.10 110 2022-07
          android12 5.10 117 2022-08
          android12 5.10 117 2022-09
          android12 5.10 136 2022-10
          android12 5.10 136 2022-11
          android12 5.10 149 2022-12
          android12 5.10 149 2023-01
          android12 5.10 160 2023-02
          android12 5.10 160 2023-03
          android12 5.10 168 2023-04
          android12 5.10 168 2023-05
          android12 5.10 177 2023-06
          android12 5.10 177 2023-07
          android12 5.10 185 2023-09
          android12 5.10 198 2023-11
          android12 5.10 198 2024-01
          android12 5.10 205 2024-03
          android12 5.10 209 2024-05
          android12 5.10 218 2024-08
          android12 5.10 226 2024-11
          android12 5.10 233 2025-02
          android12 5.10 236 2025-05
          android12 5.10 237 2025-06
          android12 5.10 240 2025-09
          android12 5.10 246 2025-12
          android13 5.15 41 2022-06
          android13 5.15 41 2022-07
          android13 5.15 41 2022-08
          android13 5.15 41 2022-09
          android13 5.15 41 2022-10
          android13 5.15 41 2022-11
          android13 5.15 74 2022-12
          android13 5.15 74 2023-01
          android13 5.15 78 2023-02
          android13 5.15 78 2023-03
          android13 5.15 94 2023-04
          android13 5.15 94 2023-05
          android13 5.15 104 2023-06
          android13 5.15 104 2023-07
          android13 5.15 119 2023-08
          android13 5.15 119 2023-09
          android13 5.15 123 2023-10
          android13 5.15 123 2023-11
          android13 5.15 137 2023-12
          android13 5.15 137 2024-01
          android13 5.15 144 2024-02
          android13 5.15 144 2024-03
          android13 5.15 148 2024-04
          android13 5.15 148 2024-05
          android13 5.15 149 2024-06
          android13 5.15 149 2024-07
          android13 5.15 151 2024-08
          android13 5.15 153 2024-09
          android13 5.15 167 2024-11
          android13 5.15 170 2025-01
          android13 5.15 178 2025-03
          android13 5.15 180 2025-05
          android13 5.15 185 2025-07
          android13 5.15 189 2025-09
          android13 5.15 194 2025-12
          android14 6.1 25 2023-06
          android14 6.1 25 2023-07
          android14 6.1 25 2023-08
          android14 6.1 25 2023-09
          android14 6.1 25 2023-10
          android14 6.1 43 2023-11
          android14 6.1 57 2023-12
          android14 6.1 57 2024-01
          android14 6.1 68 2024-02
          android14 6.1 68 2024-03
          android14 6.1 75 2024-04
          android14 6.1 75 2024-05
          android14 6.1 78 2024-06
          android14 6.1 84 2024-07
          android14 6.1 90 2024-08
          android14 6.1 93 2024-09
          android14 6.1 99 2024-10
          android14 6.1 112 2024-11
          android14 6.1 115 2024-12
          android14 6.1 118 2025-01
          android14 6.1 124 2025-02
          android14 6.1 128 2025-03
          android14 6.1 129 2025-04
          android14 6.1 134 2025-05
          android14 6.1 138 2025-06
          android14 6.1 141 2025-07
          android14 6.1 145 2025-08
          android14 6.1 145 2025-09
          android14 6.1 157 2025-12
          android14 6.1 162 2026-03
          android15 6.6 50 2024-10
          android15 6.6 56 2024-11
          android15 6.6 57 2024-12
          android15 6.6 58 2025-01
          android15 6.6 66 2025-02
          android15 6.6 77 2025-03
          android15 6.6 82 2025-04
          android15 6.6 87 2025-05
          android15 6.6 89 2025-06
          android15 6.6 92 2025-07
          android15 6.6 98 2025-08
          android15 6.6 98 2025-09
          android15 6.6 102 2025-10
          android15 6.6 118 2026-01
          android15 6.6 127 2026-04
          android16 6.12 23 2025-06
          android16 6.12 30 2025-07
          android16 6.12 38 2025-08
          android16 6.12 38 2025-09
          android16 6.12 58 2025-12
          android16 6.12 69 2026-03
          EOF
          )

          if awk -v a="$android_version" -v k="$kernel_version" -v s="$sub_level" -v p="$os_patch_level" \
            '$1 == a && $2 == k && $3 == s && $4 == p { found = 1 } END { exit found ? 0 : 1 }' <<< "$KNOWN_KERNEL_PAIRS"; then
            echo "内核版本组合校验通过: ${kernel_version}.${sub_level}-${android_version}-${os_patch_level}"
            exit 0
          fi

          patches_for_sub=$(awk -v a="$android_version" -v k="$kernel_version" -v s="$sub_level" \
            '$1 == a && $2 == k && $3 == s { print $4 }' <<< "$KNOWN_KERNEL_PAIRS" | sort -u | tr '\n' ' ')
          sublevels_for_patch=$(awk -v a="$android_version" -v k="$kernel_version" -v p="$os_patch_level" \
            '$1 == a && $2 == k && $4 == p { print $3 }' <<< "$KNOWN_KERNEL_PAIRS" | sort -n -u | tr '\n' ' ')

          echo "::error::内核版本和安全补丁级别不匹配: ${kernel_version}.${sub_level}-${android_version}-${os_patch_level}"
          if [ -n "$patches_for_sub" ]; then
            echo "::error::${android_version}/${kernel_version}.${sub_level} 可用补丁级别: ${patches_for_sub}"
          fi
          if [ -n "$sublevels_for_patch" ]; then
            echo "::error::${android_version}/${kernel_version}/${os_patch_level} 可用子版本号: ${sublevels_for_patch}"
          fi
          exit 1

      - name: 清理磁盘空间
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: 检出代码仓库
        uses: actions/checkout@v6

      - name: 确定 KernelSU 分支
        if: inputs.ksu_variant != 'None'
        id: ksu-branch
        env:
          KSU_VARIANT: ${{ inputs.ksu_variant }}
          KSU_BRANCH: ${{ inputs.ksu_branch }}
          CUSTOM_REF: ${{ inputs.custom_ref }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash .github/scripts/resolve-ksu-ref.sh

      - name: 准备 ABK 管理器证书元数据
        shell: bash
        run: |
          set -euo pipefail

          read_cert_value() {
            local key="$1"
            local file="$GITHUB_WORKSPACE/app/signing/abk-manager-cert.env"
            [ -f "$file" ] || return 0
            awk -F= -v target="$key" '
              /^[[:space:]]*#/ { next }
              $1 == target {
                value = substr($0, index($0, "=") + 1)
                gsub(/^[[:space:]\042\047]+|[[:space:]\042\047]+$/, "", value)
                print value
                exit
              }
            ' "$file"
          }

          package="${{ inputs.manager_package }}"
          cert_size="${{ inputs.manager_cert_size }}"
          cert_sha="${{ inputs.manager_cert_sha256 }}"

          [ -n "$package" ] || package="$(read_cert_value ABK_MANAGER_PACKAGE)"
          [ -n "$cert_size" ] || cert_size="$(read_cert_value ABK_MANAGER_CERT_SIZE)"
          [ -n "$cert_sha" ] || cert_sha="$(read_cert_value ABK_MANAGER_CERT_SHA256)"

          package="${package:-com.abk.kernel}"
          cert_size="${cert_size:-1407}"
          cert_sha="${cert_sha:-34e5e843952277759603cd0f949770b24c868530d80d7baeff08776a7e132b16}"
          cert_sha="$(printf '%s' "$cert_sha" | tr '[:upper:]' '[:lower:]')"

          if ! [[ "$package" =~ ^[A-Za-z0-9_.]+$ ]]; then
            echo "::error::ABK manager package is invalid: $package"
            exit 1
          fi
          if ! [[ "$cert_size" =~ ^(0x[0-9a-fA-F]+|[0-9]+)$ ]]; then
            echo "::error::ABK manager certificate size is invalid: $cert_size"
            exit 1
          fi
          if ! [[ "$cert_sha" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::ABK manager certificate SHA-256 is invalid: $cert_sha"
            exit 1
          fi

          {
            echo "ABK_MANAGER_PACKAGE=$package"
            echo "ABK_MANAGER_CERT_SIZE=$cert_size"
            echo "ABK_MANAGER_CERT_SHA256=$cert_sha"
          } >> "$GITHUB_ENV"

          {
            echo "### ABK manager identity"
            echo
            echo "- Package: \`$package\`"
            echo "- Certificate size: \`$cert_size\`"
            echo "- Certificate SHA-256: \`$cert_sha\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "ABK manager package: $package"
          echo "ABK manager cert size: $cert_size"
          echo "ABK manager cert sha256: $cert_sha"

      - name: 初始化构建环境
        run: |
          CONFIG="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}"
          KERNEL_ROOT="$GITHUB_WORKSPACE/$CONFIG"
          mkdir -p "$KERNEL_ROOT"

          cat >> $GITHUB_ENV << EOF
          CONFIG=$CONFIG
          KERNEL_ROOT=$KERNEL_ROOT
          DEFCONFIG=$KERNEL_ROOT/common/arch/arm64/configs/gki_defconfig
          SUSFS4KSU=$GITHUB_WORKSPACE/susfs4ksu
          KERNEL_PATCHES=$GITHUB_WORKSPACE/kernel_patches
          SUKISU_PATCHES=$GITHUB_WORKSPACE/SukiSU_patch
          ZZH_PATCHES=$GITHUB_WORKSPACE
          CUSTOM_EXTERNAL_MODULES_MANIFEST=$GITHUB_WORKSPACE/custom_external_modules.tsv
          ANYKERNEL3=$GITHUB_WORKSPACE/AnyKernel3
          ACTION_BUILD=$GITHUB_WORKSPACE/Action-Build
          AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool
          MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py
          UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py
          BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem
          EOF

          mkdir -p "$GITHUB_WORKSPACE/git-repo"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/git-repo/repo"
          chmod 0755 "$GITHUB_WORKSPACE/git-repo/repo"
          echo "$GITHUB_WORKSPACE/git-repo" >> "$GITHUB_PATH"
          echo "REPO=$GITHUB_WORKSPACE/git-repo/repo" >> $GITHUB_ENV

      - name: 显示配置信息
        run: |
          CONFIG_FILE="$GITHUB_WORKSPACE/config/config"
          if [ -f "$CONFIG_FILE" ]; then
            echo "加载配置文件: $CONFIG_FILE"
            cat "$CONFIG_FILE"
          fi

      - name: 安装编译依赖
        run: |
          apt_update_retry() {
            local attempt
            for attempt in 1 2 3; do
              if sudo apt-get update; then
                return 0
              fi
              echo "::warning::apt-get update 第 ${attempt} 次失败，清理索引后重试。"
              sudo apt-get clean || true
              sudo rm -rf /var/lib/apt/lists/*
              sleep "$attempt"
            done
            echo "::error::apt-get update 连续失败。"
            return 1
          }

          apt_update_retry
          sudo apt-get install -y ccache python3 git curl build-essential libssl-dev bison flex libelf-dev dwarves

      - name: 配置 ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: 恢复 ccache 缓存
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-ccache-

      - name: 缓存工具链
        id: cache-toolchain
        uses: actions/cache@v5
        with:
          path: |
            kernel-build-tools
            mkbootimg
          key: toolchain-${{ runner.os }}-v1

      - name: 下载工具链
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          AOSP_MIRROR=https://android.googlesource.com
          BRANCH=main-kernel-build-2024
          git clone $AOSP_MIRROR/kernel/prebuilts/build-tools -b $BRANCH --depth 1 kernel-build-tools
          git clone $AOSP_MIRROR/platform/system/tools/mkbootimg -b $BRANCH --depth 1 mkbootimg

      - name: 生成签名密钥
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 > $BOOT_SIGN_KEY_PATH

      - name: 配置 Git
        run: |
          git config --global user.name "BuildBot"
          git config --global user.email "BuildGkiKernel@gmail.com"

      - name: 克隆依赖仓库
        run: |
          ANYKERNEL_BRANCH="gki-2.0"
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"

          retry_git_clone() {
            local repo_url="$1"
            local branch="$2"
            local target_dir="$3"
            local attempt
            rm -rf "$target_dir"
            for attempt in 1 2 3; do
              if git clone "$repo_url" -b "$branch" --depth 1 "$target_dir"; then
                return 0
              fi
              echo "::warning::git clone 失败: $repo_url@$branch (attempt $attempt)"
              rm -rf "$target_dir"
              sleep "$attempt"
            done
            echo "::error::git clone 最终失败: $repo_url@$branch"
            return 1
          }

          echo "克隆 AnyKernel3..."
          git clone https://github.com/WildKernels/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
          rm -rf AnyKernel3/.git

          if [ "${{ inputs.enable_susfs }}" == "true" ]; then
            echo "克隆 SUSFS (分支: $SUSFS_BRANCH)..."
            retry_git_clone https://gitlab.com/simonpunk/susfs4ksu.git "$SUSFS_BRANCH" susfs4ksu

            CONFIG_FILE="config/config"
            if [ -f "$CONFIG_FILE" ]; then
              CUSTOM_ENABLED=$(grep "^custom=" "$CONFIG_FILE" | cut -d'=' -f2)
              if [ "$CUSTOM_ENABLED" == "true" ]; then
                CUSTOM_COMMIT=$(grep "^${SUSFS_BRANCH}=" "$CONFIG_FILE" | cut -d'=' -f2)
                if [ -n "$CUSTOM_COMMIT" ]; then
                  echo "切换 SUSFS 到自定义提交: $CUSTOM_COMMIT"
                  cd susfs4ksu
                  git checkout "$CUSTOM_COMMIT"
                  cd ..
                fi
              fi
            fi

            SUSFS_LATEST_COMMIT_DATE=$(git -C susfs4ksu log -1 --date=format:'%Y-%m-%d %H:%M:%S %z' --format='%cd')
            echo "SUSFS_LATEST_COMMIT_DATE=$SUSFS_LATEST_COMMIT_DATE" >> $GITHUB_ENV
            echo "SUSFS 仓库最新提交日期: $SUSFS_LATEST_COMMIT_DATE"
          else
            echo "SUSFS 已禁用，跳过 SUSFS 仓库克隆。"
            echo "SUSFS_LATEST_COMMIT_DATE=禁用" >> $GITHUB_ENV
          fi

          echo "准备补丁资源..."
          git clone https://github.com/WildKernels/kernel_patches.git
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          echo "使用当前仓库补丁目录: $ZZH_PATCHES"
          git clone https://github.com/Numbersf/Action-Build.git --depth=1

      - name: 克隆自定义外部模块
        if: inputs.use_custom_external_modules
        env:
          CUSTOM_EXTERNAL_MODULES: ${{ inputs.custom_external_modules }}
        run: |
          set -euo pipefail

          trim() {
            sed 's/^[[:space:]]*//; s/[[:space:]]*$//'
          }

          normalize_stage() {
            local raw="$1"
            local stage
            stage=$(printf '%s' "$raw" | tr '[:upper:] -' '[:lower:]__')
            case "$stage" in
              after_patch)
                printf '%s\n' "after_patch"
                ;;
              before_build|befor_build)
                printf '%s\n' "before_build"
                ;;
              *)
                return 1
                ;;
            esac
          }

          modules_input="$(printf '%s' "$CUSTOM_EXTERNAL_MODULES" | tr -d '\r')"
          manifest="$CUSTOM_EXTERNAL_MODULES_MANIFEST"
          : > "$manifest"

          if [ -z "$(printf '%s' "$modules_input" | trim)" ]; then
            echo "已启用自定义外部模块，但未配置模块字符串，跳过克隆。"
            exit 0
          fi

          IFS='|' read -r -a module_blocks <<< "$modules_input"
          index=0
          for block in "${module_blocks[@]}"; do
            block="$(printf '%s' "$block" | trim)"
            [ -n "$block" ] || continue

            if [[ "$block" != *";"* ]]; then
              echo "::error::自定义外部模块格式错误，缺少分号: $block"
              exit 1
            fi

            lhs="$(printf '%s' "${block%%;*}" | trim)"
            stage_raw="$(printf '%s' "${block#*;}" | trim)"
            entry_kind="module"
            group_repo_url=""
            child_id=""

            case "$lhs" in
              module:*)
                repo_url="$(printf '%s' "${lhs#module:}" | trim)"
                ;;
              set:*)
                descriptor="$(printf '%s' "${lhs#set:}" | trim)"
                if [[ "$descriptor" != *"#"* ]]; then
                  echo "::error::模块集格式错误，缺少子模块 id: $block"
                  exit 1
                fi
                group_repo_url="$(printf '%s' "${descriptor%%#*}" | trim)"
                child_id="$(printf '%s' "${descriptor#*#}" | trim)"
                repo_url="$group_repo_url"
                entry_kind="module_set_child"
                ;;
              *)
                repo_url="$lhs"
                ;;
            esac

            if [ -z "$repo_url" ] || [ -z "$stage_raw" ]; then
              echo "::error::自定义外部模块格式错误，链接或阶段为空: $block"
              exit 1
            fi

            if [ "$entry_kind" = "module_set_child" ] && [ -z "$child_id" ]; then
              echo "::error::模块集子模块 id 不能为空: $block"
              exit 1
            fi

            case "$repo_url" in
              http://*|https://*|git://*|ssh://*|git@*) ;;
              *)
                echo "::error::自定义外部模块链接不支持: $repo_url"
                exit 1
                ;;
            esac

            if ! stage="$(normalize_stage "$stage_raw")"; then
              echo "::error::自定义外部模块阶段不支持: $stage_raw（仅支持 after_patch / before_build）"
              exit 1
            fi

            index=$((index + 1))
            repo_name="${repo_url##*/}"
            repo_name="${repo_name%.git}"
            repo_name="$(printf '%s' "$repo_name" | sed 's/[^A-Za-z0-9._-]/_/g')"
            [ -n "$repo_name" ] || repo_name="module"
            module_dir="$GITHUB_WORKSPACE/custom_external_module_$(printf '%02d' "$index")-$repo_name"

            echo "克隆自定义外部模块 #$index ($stage/$entry_kind): $repo_url"
            git clone --depth 1 "$repo_url" "$module_dir"
            printf '%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$stage" \
              "$module_dir" \
              "$repo_url" \
              "$entry_kind" \
              "$group_repo_url" \
              "$child_id" >> "$manifest"
          done

          if [ ! -s "$manifest" ]; then
            echo "未解析到有效自定义外部模块。"
          else
            echo "自定义外部模块清单:"
            cut -f1,3 "$manifest"
          fi

      - name: 生成刷写外层 Magisk 依赖清单
        if: inputs.use_custom_external_modules
        env:
          ABK_FLASH_DEPENDENCY_MANIFEST: ${{ github.workspace }}/ABK_FLASH_DEPENDENCIES.json
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path(os.environ["CUSTOM_EXTERNAL_MODULES_MANIFEST"])
          output_path = Path(os.environ["ABK_FLASH_DEPENDENCY_MANIFEST"])

          def parse_shell_like_conf(text: str) -> dict[str, str]:
              result: dict[str, str] = {}
              lines = text.splitlines()
              index = 0
              while index < len(lines):
                  clean = lines[index].split("#", 1)[0].strip()
                  if not clean or "=" not in clean:
                      index += 1
                      continue
                  key, value = clean.split("=", 1)
                  key = key.strip()
                  value = value.strip()
                  if not key:
                      index += 1
                      continue
                  if value in {"'", '"'}:
                      quote = value
                      index += 1
                      collected: list[str] = []
                      while index < len(lines):
                          raw = lines[index]
                          if raw.strip() == quote:
                              break
                          collected.append(raw)
                          index += 1
                      result[key] = "\n".join(collected)
                  else:
                      if len(value) >= 2 and value[0] == value[-1] and value[0] in {"'", '"'}:
                          value = value[1:-1]
                      result[key] = value
                  index += 1
              return result

          def parse_module_set_items(raw: str) -> list[dict[str, str]]:
              items: list[dict[str, str]] = []
              for line in raw.splitlines():
                  clean = line.strip()
                  if not clean or clean.startswith("#"):
                      continue
                  parts = [part.strip() for part in clean.split("|")]
                  if len(parts) < 4:
                      continue
                  item = {
                      "id": parts[0],
                      "name": parts[1] if len(parts) > 1 else "",
                      "description": parts[2] if len(parts) > 2 else "",
                      "repo_url": parts[3] if len(parts) > 3 else "",
                      "magisk_module_name": parts[10] if len(parts) > 10 else "",
                      "magisk_module_download_url": parts[11] if len(parts) > 11 else "",
                  }
                  items.append(item)
              return items

          dependencies: list[dict[str, str]] = []
          companion_apps: list[dict[str, str]] = []
          seen_urls: set[str] = set()
          seen_companion_urls: set[str] = set()

          if manifest_path.exists() and manifest_path.stat().st_size > 0:
              for line in manifest_path.read_text(encoding="utf-8").splitlines():
                  if not line.strip():
                      continue
                  parts = line.split("\t")
                  if len(parts) < 3:
                      continue
                  entry_kind = parts[3].strip() if len(parts) > 3 and parts[3].strip() else "module"
                  group_repo_url = parts[4].strip() if len(parts) > 4 else ""
                  child_id = parts[5].strip() if len(parts) > 5 else ""
                  module_dir = Path(parts[1].strip())
                  repo_url = parts[2].strip()
                  conf_path = module_dir / "module.conf"
                  if not conf_path.is_file():
                      continue
                  conf = parse_shell_like_conf(conf_path.read_text(encoding="utf-8"))

                  dep_name = ""
                  dep_url = ""
                  source_name = conf.get("ABK_MODULE_NAME", "").strip()
                  source_id = conf.get("ABK_MODULE_ID", "").strip()
                  if entry_kind == "module_set_child":
                      child = next(
                          (item for item in parse_module_set_items(conf.get("ABK_MODULE_SET_ITEMS", "")) if item.get("id", "") == child_id),
                          None
                      )
                      if child is None:
                          continue
                      dep_name = child.get("magisk_module_name", "").strip()
                      dep_url = child.get("magisk_module_download_url", "").strip()
                      source_name = child.get("name", "").strip() or source_name
                      source_id = child_id or source_id
                  else:
                      dep_name = conf.get("ABK_MAGISK_MODULE_NAME", "").strip()
                      dep_url = conf.get("ABK_MAGISK_MODULE_DOWNLOAD_URL", "").strip()

                  extension_id = conf.get("ABK_EXTENSION_ID", "").strip()
                  companion_package = conf.get("ABK_EXTENSION_COMPANION_PACKAGE", "").strip()
                  companion_name = conf.get("ABK_EXTENSION_COMPANION_DISPLAY_NAME", "").strip() or source_name
                  companion_asset = conf.get("ABK_EXTENSION_COMPANION_ASSET_NAME", "").strip()
                  companion_url = conf.get("ABK_EXTENSION_COMPANION_DOWNLOAD_URL", "").strip()
                  requires_companion = conf.get("ABK_EXTENSION_REQUIRES_COMPANION_APP", "").strip().lower() in {
                      "1", "y", "yes", "true", "on"
                  }
                  if requires_companion and companion_url:
                      companion_key = companion_url.lower()
                      if companion_key not in seen_companion_urls:
                          seen_companion_urls.add(companion_key)
                          companion_apps.append(
                              {
                                  "extensionId": extension_id,
                                  "packageName": companion_package,
                                  "displayName": companion_name,
                                  "assetName": companion_asset,
                                  "downloadUrl": companion_url,
                                  "moduleId": source_id,
                                  "moduleName": source_name,
                                  "moduleRepoUrl": repo_url,
                              }
                          )

                  if not dep_url:
                      continue
                  key = dep_url.lower()
                  if key in seen_urls:
                      continue
                  seen_urls.add(key)
                  dependencies.append(
                      {
                          "id": source_id,
                          "name": dep_name or source_name or "magisk-module",
                          "downloadUrl": dep_url,
                          "moduleRepoUrl": repo_url,
                          "groupRepoUrl": group_repo_url,
                          "childId": child_id,
                          "sourceName": source_name,
                      }
                  )

          if dependencies or companion_apps:
              output_path.write_text(
                  json.dumps(
                      {
                          "schema": 2,
                          "magiskModules": dependencies,
                          "companionApps": companion_apps,
                      },
                      ensure_ascii=False,
                      indent=2,
                  ),
                  encoding="utf-8",
              )
              print(
                  f"Wrote {output_path} with "
                  f"{len(dependencies)} Magisk dependencies and "
                  f"{len(companion_apps)} companion apps"
              )
          elif output_path.exists():
              output_path.unlink()
          PY

      - name: 初始化并同步内核源码
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-gnu-6.4.1.git gcc

          FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
          echo "初始化 repo，分支: common-${FORMATTED_BRANCH}"

          $REPO init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-${FORMATTED_BRANCH} --repo-rev=v2.16

          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
          DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml

          if grep -q deprecated <<< $REMOTE_BRANCH; then
            echo "检测到已弃用的分支: $FORMATTED_BRANCH"
            sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" $DEFAULT_MANIFEST_PATH
          fi

          $REPO --trace sync -c -j$(nproc --all) --no-tags --fail-fast
          echo "REMOTE_BRANCH=$REMOTE_BRANCH" >> $GITHUB_ENV

      - name: 应用 Stock Config 伪装
        run: |
          STOCK_SRC="$GITHUB_WORKSPACE/config/stock_defconfig"
          STOCK_DST="$KERNEL_ROOT/common/arch/arm64/configs/stock_defconfig"

          if [ ! -f "$STOCK_SRC" ]; then
            echo "未检测到 $STOCK_SRC，跳过 Stock Config 伪装。"
            exit 0
          fi

          mkdir -p "$(dirname "$STOCK_DST")"
          if ! cp "$STOCK_SRC" "$STOCK_DST"; then
            echo "::error::复制 stock_defconfig 失败: $STOCK_SRC -> $STOCK_DST"
            exit 1
          fi
          echo "已复制 stock_defconfig -> $STOCK_DST"

          NEW_RULE='$(obj)/config_data: arch/arm64/configs/stock_defconfig FORCE'
          OLD_RULE='$(obj)/config_data: $(KCONFIG_CONFIG) FORCE'
          TARGET_MAKEFILE="$KERNEL_ROOT/common/kernel/Makefile"

          if [ ! -f "$TARGET_MAKEFILE" ]; then
            echo "::error::未找到 $TARGET_MAKEFILE"
            exit 1
          fi

          if grep -qF "$NEW_RULE" "$TARGET_MAKEFILE"; then
            echo "config_data 规则已是 stock_defconfig，跳过。"
          elif grep -qF "$OLD_RULE" "$TARGET_MAKEFILE"; then
            sed -i 's|$(obj)/config_data: $(KCONFIG_CONFIG) FORCE|$(obj)/config_data: arch/arm64/configs/stock_defconfig FORCE|' "$TARGET_MAKEFILE"
            echo "已替换 config_data 规则: $TARGET_MAKEFILE"
          else
            echo "::error::未在 $TARGET_MAKEFILE 找到规则: $OLD_RULE"
            exit 1
          fi

      - name: 提取实际子版本号
        run: |
          ACTUAL_SUBLEVEL="${{ inputs.sub_level }}"
          if [[ -f "$KERNEL_ROOT/common/Makefile" ]]; then
            EXTRACTED=$(grep '^SUBLEVEL = ' "$KERNEL_ROOT/common/Makefile" | awk '{print $3}')
            [[ -n "$EXTRACTED" ]] && ACTUAL_SUBLEVEL="$EXTRACTED"
          fi
          echo "ACTUAL_SUBLEVEL=$ACTUAL_SUBLEVEL" >> $GITHUB_ENV
          echo "实际子版本号: $ACTUAL_SUBLEVEL"

      - name: 修复 glibc 2.38 兼容性
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          RAW_SUB="${{ inputs.sub_level }}"
          [[ ! "$RAW_SUB" =~ ^[0-9]+$ ]] && CURRENT_SUB=99999 || CURRENT_SUB=$RAW_SUB

          NEEDS_FIX=false
          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.10" && $CURRENT_SUB -le 186 ]] ||
             [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" && $CURRENT_SUB -le 119 ]] ||
             [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" && $CURRENT_SUB -le 43 ]]; then
            NEEDS_FIX=true
          fi

          if [ "$NEEDS_FIX" = true ]; then
            GLIBC_VERSION=$(ldd --version 2>/dev/null | head -n 1 | awk '{print $NF}')
            if [ "$(printf '%s\n' "2.38" "$GLIBC_VERSION" | sort -V | head -n1)" = "2.38" ]; then
              echo "应用 glibc 2.38 兼容性修复..."
              sed -i '/\$(Q)\$(MAKE) -C \$(SUBCMD_SRC) OUTPUT=\$(abspath \$(dir \$@))\/ \$(abspath \$@)/s//$(Q)$(MAKE) -C $(SUBCMD_SRC) EXTRA_CFLAGS="$(CFLAGS)" OUTPUT=$(abspath $(dir $@))\/ $(abspath $@)/' tools/bpf/resolve_btfids/Makefile 2>/dev/null || true

              if [[ "${{ inputs.kernel_version }}" == "5.10" || "${{ inputs.kernel_version }}" == "5.15" ]]; then
                sed -i '/char \*buf = NULL;/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i 's/for (int i = 0; subcommands\[i\]; i++) {/for (i = 0; subcommands[i]; i++) {/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i '/if (subcommands) {/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i 's/for (int i = 0; subcommands\[i\]; i++)/for (i = 0; subcommands[i]; i++)/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
              fi
            fi
          fi

      - name: 添加一加 8E 处理器支持
        if: inputs.supp_op
        working-directory: ${{ env.KERNEL_ROOT }}/common/drivers
        run: |
          echo "下载一加 8E 支持补丁..."
          curl -LSs "https://github.com/xingguangcuican6666/ABK/raw/refs/heads/dev/hmbird_patch.c" -o hmbird_patch.c
          echo "obj-y += hmbird_patch.o" >> Makefile

      - name: 添加 KernelSU
        if: inputs.ksu_variant != 'None'
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          case "${{ inputs.ksu_variant }}" in
            "Official")
              echo "添加 KernelSU 官方版..."
              curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s $BRANCH

              cd KernelSU
              KSU_GIT_VERSION=$(git rev-list --count HEAD)
              KSU_VERSION=$((30000 + KSU_GIT_VERSION))
              echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV

              if [ -f "kernel/Kbuild" ]; then
                sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
              fi
              cd ..
              ;;
            "SukiSU")
              echo "添加 SukiSU..."
              curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s $BRANCH
              ;;
            "ReSukiSU")
              echo "添加 ReSukiSU..."
              curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s "$BRANCH"
              ;;
          esac

          if [ -d "KernelSU/.git" ]; then
            KSU_LATEST_COMMIT_DATE=$(git -C KernelSU log -1 --date=format:'%Y-%m-%d %H:%M:%S %z' --format='%cd')
            echo "KSU_LATEST_COMMIT_DATE=$KSU_LATEST_COMMIT_DATE" >> $GITHUB_ENV
          else
            echo "KSU_LATEST_COMMIT_DATE=未知" >> $GITHUB_ENV
          fi

      - name: 修复 ReSukiSU SUSFS 源码兼容
        if: inputs.ksu_variant == 'ReSukiSU' && inputs.enable_susfs
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -euo pipefail
          echo "ReSukiSU SUSFS compat cwd: $(pwd)"

          python3 - <<'PY'
          from pathlib import Path
          import re

          def preprocessor_delta(text):
              opens = 0
              closes = 0
              for line in text.splitlines():
                  stripped = line.strip()
                  if stripped.startswith("#if"):
                      opens += 1
                  elif stripped.startswith("#endif"):
                      closes += 1
              return opens - closes

          def ensure_include(text, include_line, anchors, path):
              if include_line in text:
                  return text
              for anchor in anchors:
                  if anchor in text:
                      return text.replace(anchor, anchor + include_line, 1)
              raise SystemExit(f"{path} missing include anchor for {include_line.strip()}")

          def patch_resukisu_selinux_hide(path):
              original = path.read_text()
              text = original

              text = re.sub(
                  r"(?m)^\s*(?:static\s+|__maybe_static\s+)?struct\s+selinux_state\s+fake_state\s*;",
                  "struct selinux_state fake_state;",
                  text,
              )
              text = re.sub(
                  r"(?m)^\s*(?:static\s+|__maybe_static\s+)?bool\s+ksu_selinux_hide_running\s+__read_mostly\s*=\s*false\s*;",
                  "bool ksu_selinux_hide_running __read_mostly = false;",
                  text,
              )
              text = re.sub(
                  r"(?m)^\s*(?:static\s+|__maybe_static\s+)?bool\s+ksu_selinux_hide_enabled\s+__read_mostly\s*=\s*false\s*;",
                  "bool ksu_selinux_hide_enabled __read_mostly = false;",
                  text,
              )
              text = re.sub(
                  r"(?m)^\s*(?:static\s+|__maybe_static\s+)?int\s+security_context_to_sid_with_policy\s*\(",
                  "int security_context_to_sid_with_policy(",
                  text,
              )
              text = re.sub(
                  r"(?m)^\s*(?:static\s+|__maybe_static\s+)?int\s+security_sid_to_context_with_policy\s*\(",
                  "int security_sid_to_context_with_policy(",
                  text,
              )
              text = re.sub(
                  r"(?m)^\s*(?:static\s+|__maybe_static\s+)?void\s+__nocfi\s+security_compute_av_user_with_policy\s*\(",
                  "void __nocfi security_compute_av_user_with_policy(",
                  text,
              )
              text = re.sub(
                  r"(?m)^\s*(?:static\s+|__maybe_static\s+)?void\s+security_compute_av_user_with_policy\s*\(",
                  "void security_compute_av_user_with_policy(",
                  text,
              )

              text = re.sub(
                  r"(?m)^\s*(?:static\s+|__maybe_static\s+)?DEFINE_STATIC_KEY_FALSE\s*\(\s*fake_status_initialize_key\s*\)\s*;",
                  "DEFINE_STATIC_KEY_FALSE(fake_status_initialize_key);",
                  text,
              )
              text = re.sub(
                  r"(?m)^\s*(?:static\s+|__maybe_static\s+)?struct\s+page\s*\*\s*fake_status\s*(?:=\s*NULL)?\s*;",
                  "struct page *fake_status = NULL;",
                  text,
              )
              text = re.sub(
                  r"(?m)^\s*(?:static\s+|__maybe_static\s+)?void\s+initialize_fake_status\s*\(\s*(?:void)?\s*\)",
                  "void initialize_fake_status(void)",
                  text,
              )

              fake_status_additions = []
              if not re.search(r"(?m)^\s*DEFINE_STATIC_KEY_FALSE\s*\(\s*fake_status_initialize_key\s*\)\s*;", text):
                  fake_status_additions.append("DEFINE_STATIC_KEY_FALSE(fake_status_initialize_key);")
              if not re.search(r"(?m)^\s*struct\s+page\s*\*\s*fake_status\s*(?:=\s*NULL)?\s*;", text):
                  fake_status_additions.append("struct page *fake_status = NULL;")
              if not re.search(r"(?m)^\s*void\s+initialize_fake_status\s*\(\s*(?:void)?\s*\)\s*\{", text):
                  fake_status_additions.extend([
                      "void initialize_fake_status(void)",
                      "{",
                      "}",
                  ])
              if fake_status_additions:
                  text = ensure_include(
                      text,
                      "#include <linux/jump_label.h>\n",
                      ("#include <linux/mutex.h>\n", "#include <linux/version.h>\n"),
                      path,
                  )
                  anchor = "bool ksu_selinux_hide_running __read_mostly = false;\n"
                  if anchor not in text:
                      raise SystemExit(f"{path} missing fake status insertion anchor")
                  block = "\n".join([
                      "",
                      "#ifdef CONFIG_KSU_SUSFS",
                      *fake_status_additions,
                      "#endif",
                      "",
                  ])
                  text = text.replace(anchor, anchor + block, 1)

              if text != original:
                  path.write_text(text)
                  print(f"Patched ReSukiSU selinux_hide compatibility exports: {path}")

              final_text = path.read_text()
              required = (
                  "struct selinux_state fake_state;",
                  "DEFINE_STATIC_KEY_FALSE(fake_status_initialize_key);",
                  "struct page *fake_status = NULL;",
                  "bool ksu_selinux_hide_enabled __read_mostly",
                  "bool ksu_selinux_hide_running __read_mostly",
                  "void initialize_fake_status(",
                  "int security_context_to_sid_with_policy(",
                  "int security_sid_to_context_with_policy(",
              )
              missing = [marker for marker in required if marker not in final_text]
              if missing:
                  raise SystemExit(f"{path} missing ReSukiSU SELinux compatibility markers: {missing}")

              forbidden_patterns = {
                  "fake_state": r"(?m)^\s*(?:static|__maybe_static)\s+struct\s+selinux_state\s+fake_state\s*;",
                  "ksu_selinux_hide_running": r"(?m)^\s*(?:static|__maybe_static)\s+bool\s+ksu_selinux_hide_running\s+__read_mostly\s*=\s*false\s*;",
                  "ksu_selinux_hide_enabled": r"(?m)^\s*(?:static|__maybe_static)\s+bool\s+ksu_selinux_hide_enabled\s+__read_mostly\s*=\s*false\s*;",
                  "security_context_to_sid_with_policy": r"(?m)^\s*(?:static|__maybe_static)\s+int\s+security_context_to_sid_with_policy\s*\(",
                  "security_sid_to_context_with_policy": r"(?m)^\s*(?:static|__maybe_static)\s+int\s+security_sid_to_context_with_policy\s*\(",
                  "security_compute_av_user_with_policy __nocfi": r"(?m)^\s*(?:static|__maybe_static)\s+void\s+__nocfi\s+security_compute_av_user_with_policy\s*\(",
                  "security_compute_av_user_with_policy": r"(?m)^\s*(?:static|__maybe_static)\s+void\s+security_compute_av_user_with_policy\s*\(",
              }
              present = [
                  name for name, pattern in forbidden_patterns.items()
                  if re.search(pattern, final_text)
              ]
              if present:
                  raise SystemExit(f"{path} still has non-exported ReSukiSU SELinux symbols: {present}")

              if (
                  "void __nocfi security_compute_av_user_with_policy(" not in final_text
                  and "void security_compute_av_user_with_policy(" not in final_text
              ):
                  raise SystemExit(f"{path} missing exported security_compute_av_user_with_policy()")

          def patch_resukisu_rules(path):
              original = path.read_text()
              text = re.sub(
                  r"(?m)^\s*(?:static\s+|__maybe_static\s+)?struct\s+selinux_policy\s*\*\s*backup_sepolicy\s*;",
                  "struct selinux_policy *backup_sepolicy;",
                  original,
              )

              if text != original:
                  path.write_text(text)
                  print(f"Patched ReSukiSU backup_sepolicy owner: {path}")

              final_text = path.read_text()
              if "struct selinux_policy *backup_sepolicy;" not in final_text:
                  raise SystemExit(f"{path} missing backup_sepolicy definition")
              forbidden = (
                  "static struct selinux_policy *backup_sepolicy;",
                  "__maybe_static struct selinux_policy *backup_sepolicy;",
              )
              present = [marker for marker in forbidden if marker in final_text]
              if present:
                  raise SystemExit(f"{path} still has non-exported backup_sepolicy definition: {present}")

          def patch_resukisu_selinux(path):
              original = path.read_text()
              text = original
              marker = "/* ABK: simonpunk SUSFS SELinux hooks reference KernelSU selinux_hide globals. */"
              if marker in text:
                  start = text.index(marker)
                  start = text.rfind("\n", 0, start) + 1 if "\n" in text[:start] else 0
                  end_marker = "#endif\n#endif"
                  end = text.find(end_marker, start)
                  if end == -1:
                      raise SystemExit(f"{path} contains stale ABK SELinux compat marker without closing guards")
                  end += len(end_marker)
                  while end < len(text) and text[end] == "\n":
                      end += 1
                  text = text[:start] + text[end:]

              if text != original:
                  path.write_text(text)
                  print(f"Removed duplicate-prone ReSukiSU SELinux globals from {path}")

              final_text = path.read_text()
              forbidden = (
                  marker,
                  "struct selinux_state fake_state;",
                  "bool ksu_selinux_hide_running __read_mostly = false;",
                  "bool ksu_selinux_hide_enabled __read_mostly = false;",
                  "struct selinux_policy *backup_sepolicy;",
                  "int security_context_to_sid_with_policy(struct selinux_policy *policy, const char *scontext, u32 scontext_len,",
                  "int security_sid_to_context_with_policy(struct selinux_policy *policy, u32 sid, char **scontext,",
                  "void security_compute_av_user_with_policy(struct selinux_policy *policy, u32 ssid, u32 tsid, u16 tclass,",
              )
              present = [marker_text for marker_text in forbidden if marker_text in final_text]
              if present:
                  raise SystemExit(f"{path} still contains duplicate-prone ReSukiSU SELinux definitions: {present}")

          variant = "${{ inputs.ksu_variant }}"
          candidates = []
          seen = set()
          roots = [Path("KernelSU/kernel")]
          if variant == "ReSukiSU":
              roots.extend([Path("common/drivers/kernelsu"), Path("drivers/kernelsu")])

          for base in roots:
              resolved = base.resolve()
              if resolved in seen:
                  continue
              if variant == "ReSukiSU":
                  markers = ["Kbuild", "core/init.c", "feature/sucompat.c", "sulog/event.c"]
                  if any((base / marker).exists() for marker in markers):
                      candidates.append(base)
                      seen.add(resolved)
              elif (base / "ksu.c").exists():
                  candidates.append(base)
                  seen.add(resolved)

          if not candidates:
              if variant == "ReSukiSU":
                  raise SystemExit("未找到实际 ReSukiSU 源码目录，无法应用 SUSFS 兼容修复")
              raise SystemExit("未找到 KernelSU/kernel/ksu.c，无法应用 SukiSU/ReSukiSU SUSFS 兼容修复")

          for kernel_dir in candidates:
              print(f"检查 SukiSU/ReSukiSU SUSFS 源码目录: {kernel_dir}")
              ksu_c = kernel_dir / "ksu.c"
              tree_text = "\n".join(
                  path.read_text(errors="ignore")
                  for path in kernel_dir.rglob("*")
                  if path.is_file()
              )

              true_symbols = [
                  "ksu_is_init_rc_hook_enabled",
                  "ksu_is_input_hook_enabled",
              ]
              false_symbols = [
                  "ksu_init_rc_hook_key_false",
                  "ksu_input_hook_key_false",
              ]

              missing_true = [
                  sym for sym in true_symbols
                  if f"DEFINE_STATIC_KEY_TRUE({sym}" not in tree_text
              ]
              missing_false = [
                  sym for sym in false_symbols
                  if f"DEFINE_STATIC_KEY_FALSE({sym}" not in tree_text
              ]

              if not missing_true and not missing_false:
                  print("SukiSU/ReSukiSU SUSFS static key definitions already exist.")
              else:
                  if not ksu_c.exists():
                      print(f"  {kernel_dir} 未提供 ksu.c，跳过 static key 注入")
                      text = ""
                  else:
                      text = ksu_c.read_text()
                  anchor = '#include "infra/kernel_compat.h"\n'
                  if ksu_c.exists() and anchor not in text:
                      if variant == "ReSukiSU":
                          print(f"  {ksu_c} 未找到 kernel_compat.h include anchor，跳过 static key 注入")
                          continue
                      raise SystemExit("kernel_compat.h include anchor not found in KernelSU/kernel/ksu.c")
                  elif ksu_c.exists():
                      block = [
                          "",
                          "/* ABK: SukiSU/ReSukiSU builtin SUSFS expects these inline hook static keys. */",
                          "#ifdef CONFIG_KSU_SUSFS",
                      ]
                      block.extend(f"DEFINE_STATIC_KEY_TRUE({sym});" for sym in missing_true)
                      if missing_false:
                          block.append("#if defined(KSU_COMPAT_USE_STATIC_KEY)")
                          block.extend(f"DEFINE_STATIC_KEY_FALSE({sym});" for sym in missing_false)
                          block.append("#endif")
                      block.extend(["#endif", ""])

                      ksu_c.write_text(text.replace(anchor, anchor + "\n".join(block), 1))
                      print("Injected missing SukiSU/ReSukiSU SUSFS static key definitions:", ", ".join(missing_true + missing_false))

              if variant == "ReSukiSU":
                  selinux_hide_c = kernel_dir / "feature/selinux_hide.c"
                  rules_c = kernel_dir / "selinux/rules.c"
                  selinux_c = kernel_dir / "selinux/selinux.c"
                  if not selinux_hide_c.exists():
                      raise SystemExit(f"{kernel_dir} missing feature/selinux_hide.c")
                  if not rules_c.exists():
                      raise SystemExit(f"{kernel_dir} missing selinux/rules.c")
                  if not selinux_c.exists():
                      raise SystemExit(f"{kernel_dir} missing selinux/selinux.c")
                  patch_resukisu_selinux_hide(selinux_hide_c)
                  patch_resukisu_rules(rules_c)
                  patch_resukisu_selinux(selinux_c)

              sucompat_c = kernel_dir / "feature/sucompat.c"
              if sucompat_c.exists():
                  text = sucompat_c.read_text()
                  marker = "\n// dead code\n"
                  guard = "#endif /* CONFIG_KSU_SUSFS */\n"
                  if marker in text and guard not in text:
                      before_marker = text.split(marker, 1)[0]
                      if preprocessor_delta(before_marker) > 0:
                          sucompat_c.write_text(text.replace(marker, "\n" + guard + marker, 1))
                          print("Closed missing SukiSU/ReSukiSU builtin CONFIG_KSU_SUSFS block in feature/sucompat.c")

              sulog_event_c = kernel_dir / "sulog/event.c"
              if sulog_event_c.exists():
                  text = sulog_event_c.read_text()
                  marker = "builtin SUSFS ksu_sulog_capture() expects argv_user as a pointer"
                  new = "\n".join([
                      "    /* ABK: builtin SUSFS ksu_sulog_capture() expects argv_user as a pointer. */",
                      "#ifdef CONFIG_KSU_SUSFS",
                      "    pending = ksu_sulog_capture(KSU_SULOG_EVENT_IOCTL_GRANT_ROOT, NULL, NULL, gfp);",
                      "#else",
                      "    pending = ksu_sulog_capture(KSU_SULOG_EVENT_IOCTL_GRANT_ROOT, NULL, USER_ARG_NULL, gfp);",
                      "#endif",
                  ])
                  if marker not in text:
                      for old in (
                          "    pending = ksu_sulog_capture(KSU_SULOG_EVENT_IOCTL_GRANT_ROOT, NULL, USER_ARG_NULL, gfp);",
                          "    pending = ksu_sulog_capture(KSU_SULOG_EVENT_IOCTL_GRANT_ROOT, NULL, &USER_ARG_NULL, gfp);",
                      ):
                          if old in text:
                              sulog_event_c.write_text(text.replace(old, new, 1))
                              print("Fixed SukiSU/ReSukiSU builtin sulog grant_root argv type for CONFIG_KSU_SUSFS")
                              break
          PY

      - name: 配置 SukiSU 管理器信息
        if: inputs.ksu_variant == 'SukiSU'
        working-directory: ${{ env.KERNEL_ROOT }}/KernelSU
        run: |
          KBUILD_FILE="./kernel/Kbuild"
          CUSTOM_TAG="${{ vars.MANAGER_STR }}"

          if [ ! -f "$KBUILD_FILE" ]; then
            echo "未找到 $KBUILD_FILE，跳过 SukiSU 版本标识定制"
            exit 0
          fi

          GIT_HASH=$(git rev-parse --short=8 HEAD)
          BRANCH_NAME="${BRANCH#-s }"
          if [ -z "$BRANCH_NAME" ] || [ "$BRANCH_NAME" = "$BRANCH" ]; then
            BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "main")
          fi

          if [ -n "$CUSTOM_TAG" ]; then
            VERSION_TEMPLATE="v\$1-$CUSTOM_TAG@$BRANCH_NAME[$GIT_HASH]"
          else
            VERSION_TEMPLATE="v\$1-$GIT_HASH@$BRANCH_NAME"
          fi

          awk -v body="$VERSION_TEMPLATE" '
            BEGIN {
              in_block = 0
              replaced = 0
            }
            /^[[:space:]]*define get_ksu_version_full$/ {
              print
              print body
              in_block = 1
              replaced = 1
              next
            }
            in_block && /^[[:space:]]*endef$/ {
              print
              in_block = 0
              next
            }
            !in_block {
              print
            }
            END {
              if (!replaced) {
                exit 1
              }
            }
          ' "$KBUILD_FILE" > "${KBUILD_FILE}.tmp" && mv "${KBUILD_FILE}.tmp" "$KBUILD_FILE"

          echo "已更新 get_ksu_version_full 模板: $VERSION_TEMPLATE"

      - name: 应用 SUSFS 补丁
        if: inputs.enable_susfs && inputs.ksu_variant != 'None'
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          echo "应用 SUSFS 补丁..."
          # 读取 SUSFS 上游版本（例如 v2.1.0），用于匹配修复补丁目录
          SUSFS_VERSION=$(grep -E '^#define[[:space:]]+SUSFS_VERSION' "$SUSFS4KSU/kernel_patches/include/linux/susfs.h" | awk '{print $3}' | tr -d '"' | sed 's/^v//')
          if [ -z "$SUSFS_VERSION" ]; then
            SUSFS_VERSION="2.0.0"
          fi

          resolve_susfs_fix_root() {
            local version="$1"
            local candidate
            for candidate in \
              "$KERNEL_PATCHES/wild/susfs_fix_patches/v${version}" \
              "$KERNEL_PATCHES/wild/archived/susfs_fix_patches/v${version}" \
              "$KERNEL_PATCHES/ksu/susfs_fix_patches/v${version}"; do
              if [ -d "$candidate" ]; then
                printf '%s\n' "$candidate"
                return 0
              fi
            done
            return 1
          }

          SUSFS_FIX_VERSION="$SUSFS_VERSION"
          SUSFS_FIX_ROOT="$(resolve_susfs_fix_root "$SUSFS_FIX_VERSION" || true)"
          if [ -z "$SUSFS_FIX_ROOT" ] && [ "$SUSFS_FIX_VERSION" != "2.0.0" ]; then
            echo "未找到 v${SUSFS_FIX_VERSION} 的 SUSFS 修复补丁，回退 v2.0.0"
            SUSFS_VERSION="2.0.0"
            SUSFS_FIX_VERSION="$SUSFS_VERSION"
            SUSFS_FIX_ROOT="$(resolve_susfs_fix_root "$SUSFS_FIX_VERSION" || true)"
          fi

          SUSFS_KSU_FIX_ROOT=""
          if [ -d "$KERNEL_PATCHES/ksu/susfs_fix_patches/v${SUSFS_FIX_VERSION}" ]; then
            SUSFS_KSU_FIX_ROOT="$KERNEL_PATCHES/ksu/susfs_fix_patches/v${SUSFS_FIX_VERSION}"
          fi

          if [ -n "$SUSFS_FIX_ROOT" ]; then
            echo "SUSFS 修复补丁版本: v${SUSFS_FIX_VERSION}"
            echo "SUSFS 修复补丁目录: ${SUSFS_FIX_ROOT#$KERNEL_PATCHES/}"
          else
            echo "::warning::未找到可用的 SUSFS 修复补丁目录，将仅依赖源码兜底修复"
          fi

          apply_susfs_patch_file() {
            local rel_path="$1"
            local patch_source=""

            if [ -n "$SUSFS_FIX_ROOT" ] && [ -f "$SUSFS_FIX_ROOT/$rel_path" ]; then
              patch_source="$SUSFS_FIX_ROOT/$rel_path"
            elif [ -n "$SUSFS_KSU_FIX_ROOT" ] && [ -f "$SUSFS_KSU_FIX_ROOT/$rel_path" ]; then
              patch_source="$SUSFS_KSU_FIX_ROOT/$rel_path"
            elif [ -n "$SUSFS_KSU_FIX_ROOT" ]; then
              case "$rel_path" in
                */fdinfo.c.patch)
                  [ -f "$SUSFS_KSU_FIX_ROOT/fix_fdinfo.c.patch" ] && patch_source="$SUSFS_KSU_FIX_ROOT/fix_fdinfo.c.patch"
                  ;;
                */namespace.c.patch)
                  [ -f "$SUSFS_KSU_FIX_ROOT/fix_namespace.c.patch" ] && patch_source="$SUSFS_KSU_FIX_ROOT/fix_namespace.c.patch"
                  ;;
                */open.c.patch)
                  [ -f "$SUSFS_KSU_FIX_ROOT/fix_open.c.patch" ] && patch_source="$SUSFS_KSU_FIX_ROOT/fix_open.c.patch"
                  ;;
                */task_mmu.c.patch)
                  [ -f "$SUSFS_KSU_FIX_ROOT/fix_task_mmu.c.patch" ] && patch_source="$SUSFS_KSU_FIX_ROOT/fix_task_mmu.c.patch"
                  ;;
              esac
            fi

            if [ -z "$patch_source" ]; then
              return 1
            fi

            patch -p1 < "$patch_source" || true
            return 0
          }

          apply_susfs_optional_patch() {
            local description="$1"
            local rel_path="$2"

            if ! apply_susfs_patch_file "$rel_path"; then
              echo "::warning::$description 对应的 SUSFS 修复补丁不存在，已跳过"
            fi
            return 0
          }

          apply_susfs_base_patch() {
            local description="$1"
            local rel_path="$2"

            if apply_susfs_patch_file "$rel_path"; then
              return 0
            fi

            local applied=0 fallback_patch
            if [ -n "$SUSFS_KSU_FIX_ROOT" ]; then
              for fallback_patch in 1_fix_base.c.patch 2_fix_base.c.patch; do
                if [ -f "$SUSFS_KSU_FIX_ROOT/$fallback_patch" ]; then
                  patch -p1 < "$SUSFS_KSU_FIX_ROOT/$fallback_patch" || true
                  applied=1
                fi
              done
            fi

            if [ "$applied" -eq 0 ]; then
              echo "::warning::$description 对应的 SUSFS base 修复补丁不存在，已跳过"
            fi
            return 0
          }

          cp $SUSFS4KSU/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./common/
          cp $SUSFS4KSU/kernel_patches/fs/* ./common/fs/
          cp $SUSFS4KSU/kernel_patches/include/linux/* ./common/include/linux/

          case "${{ inputs.ksu_variant }}" in
            "Official")
              cd ./KernelSU
              cp $SUSFS4KSU/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
              # 兼容旧版补丁：仅当补丁仍只修改 kernel/Makefile 时，才替换为 kernel/Kbuild
              if grep -q '^diff --git a/kernel/Makefile b/kernel/Makefile' ./10_enable_susfs_for_ksu.patch \
                && ! grep -q '^diff --git a/kernel/Kbuild b/kernel/Kbuild' ./10_enable_susfs_for_ksu.patch; then
                sed -i 's|kernel/Makefile|kernel/Kbuild|g' ./10_enable_susfs_for_ksu.patch
              fi
              patch -p1 --forward < 10_enable_susfs_for_ksu.patch || true

              cd ..
              ;;
            "ReSukiSU")
              echo "ReSukiSU 使用内置 SUSFS 支持"
              ;;
            "SukiSU")
              echo "SukiSU 使用单独步骤注入 SUSFS Kconfig 符号"
              ;;
          esac

          cd $KERNEL_ROOT/common
          patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true

          if [ "${{ inputs.ksu_variant }}" == "SukiSU" ] || [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ]; then
            SUSFS_C="./fs/susfs.c"
            if [ -f "$SUSFS_C" ] && grep -q '^static void susfs_run_sus_path_loop(' "$SUSFS_C"; then
              sed -i 's/^static void susfs_run_sus_path_loop(/void susfs_run_sus_path_loop(/' "$SUSFS_C"
              echo "已导出 susfs_run_sus_path_loop 供 SukiSU/ReSukiSU LSM hook 调用"
            fi
          fi

          if [ "${{ inputs.ksu_variant }}" == "Official" ] || [ "${{ inputs.ksu_variant }}" == "SukiSU" ] || [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ]; then
            CURRENT_SUB="${{ inputs.sub_level }}"
            if [[ ! "$CURRENT_SUB" =~ ^[0-9]+$ ]]; then
              CURRENT_SUB=99999
            fi

            sub_in_range() {
              local value="$1"
              local min="$2"
              local max="$3"
              [[ "$value" =~ ^[0-9]+$ ]] || return 1
              (( value >= min && value <= max ))
            }

            fix_task_mmu_show_pad() {
              local file="./fs/proc/task_mmu.c"
              [ -f "$file" ] || return 0

              if grep -qF 'goto show_pad;' "$file"; then
                sed -i -e 's/goto show_pad;/return 0;/' "$file"
                echo "已替换 task_mmu.c 中的 goto show_pad"
              fi

              if grep -q '^[[:space:]]*show_pad:[[:space:]]*$' "$file" && ! grep -qF 'goto show_pad;' "$file"; then
                sed -i '/^[[:space:]]*show_pad:[[:space:]]*$/d' "$file"
                echo "已移除 task_mmu.c 中无引用的 show_pad 标签，避免 -Wunused-label"
              fi
            }

            fix_proc_base_missing_vma_decl() {
              local file="./fs/proc/base.c"
              [ -f "$file" ] || return 0
              grep -qF 'vma = find_vma(mm, addr);' "$file" || return 0

              local assign_line start_line relative_mm_line mm_line
              assign_line="$(awk '/vma = find_vma\(mm, addr\);/ { print NR; exit }' "$file")"
              [ -n "$assign_line" ] || return 0
              start_line=$(( assign_line > 80 ? assign_line - 80 : 1 ))

              if sed -n "${start_line},$((assign_line - 1))p" "$file" | grep -qF 'struct vm_area_struct *vma;'; then
                return 0
              fi

              relative_mm_line="$(sed -n "${start_line},$((assign_line - 1))p" "$file" | awk '/struct mm_struct \*mm([[:space:]=;]|$)/ { line = NR } END { if (line) print line }')"
              [ -n "$relative_mm_line" ] || return 0
              mm_line=$(( start_line + relative_mm_line - 1 ))

              awk -v target="$mm_line" '
                NR == target {
                  print
                  match($0, /^[ \t]*/)
                  print substr($0, RSTART, RLENGTH) "struct vm_area_struct *vma;"
                  next
                }
                { print }
              ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
              echo "已修复 proc/base.c 缺少 vma 声明"
            }

            fix_task_mmu_unused_vma_decl() {
              local file="./fs/proc/task_mmu.c"
              [ -f "$file" ] || return 0
              grep -qF 'struct vm_area_struct *vma;' "$file" || return 0

              python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("./fs/proc/task_mmu.c")
          lines = path.read_text().splitlines(keepends=True)
          changed = False

          for index, line in enumerate(lines):
              if "struct vm_area_struct *vma;" not in line:
                  continue

              start = index
              while start > 0:
                  if "{" in lines[start]:
                      break
                  start -= 1

              depth = 0
              end = len(lines)
              for cursor in range(start, len(lines)):
                  depth += lines[cursor].count("{")
                  depth -= lines[cursor].count("}")
                  if cursor > start and depth <= 0:
                      end = cursor + 1
                      break

              body = "".join(lines[start:end])
              body_without_decl = body.replace(line, "", 1)
              if not re.search(r"\bvma\b", body_without_decl):
                  lines[index] = ""
                  changed = True

          if changed:
              path.write_text("".join(lines))
          PY

              if ! grep -qF 'struct vm_area_struct *vma;' "$file"; then
                echo "已移除 task_mmu.c 中无使用的 vma 声明"
              fi
            }

            fix_memory_missing_susfs_def() {
              local file="./mm/memory.c"
              [ -f "$file" ] || return 0
              grep -qF 'SUSFS_IS_INODE_SUS_MAP' "$file" || return 0
              grep -qF '#include <linux/susfs_def.h>' "$file" && return 0

              if grep -qF '#include <linux/zswap.h>' "$file"; then
                sed -i '/#include <linux\/zswap.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' "$file"
              elif grep -qF '#include <linux/sched/sysctl.h>' "$file"; then
                sed -i '/#include <linux\/sched\/sysctl.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' "$file"
              elif grep -qF '#include <linux/mm_inline.h>' "$file"; then
                sed -i '/#include <linux\/mm_inline.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' "$file"
              elif grep -qF '#include <linux/mm.h>' "$file"; then
                sed -i '/#include <linux\/mm.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' "$file"
              else
                sed -i '1i #ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs_def.h>\n#endif' "$file"
              fi
              echo "已修复 memory.c 缺少 susfs_def.h 问题"
            }

            fix_selinux_extern_static() {
              local file="./security/selinux/hooks.c"
              if [ -f "$file" ] && grep -qF 'extern static int security_context_to_sid_with_policy' "$file"; then
                sed -i 's/extern static int security_context_to_sid_with_policy/int security_context_to_sid_with_policy/' "$file"
                echo "已修复 hooks.c 中 security_context_to_sid_with_policy 的 extern static 冲突"
              fi

              file="./security/selinux/selinuxfs.c"
              if [ -f "$file" ] && grep -qF 'extern static int security_context_to_sid_with_policy' "$file"; then
                sed -i 's/extern static int security_context_to_sid_with_policy/int security_context_to_sid_with_policy/' "$file"
                echo "已修复 selinuxfs.c 中 security_context_to_sid_with_policy 的 extern static 冲突"
              fi
              if [ -f "$file" ] && grep -qF 'extern static int security_sid_to_context_with_policy' "$file"; then
                sed -i 's/extern static int security_sid_to_context_with_policy/int security_sid_to_context_with_policy/' "$file"
                echo "已修复 selinuxfs.c 中 security_sid_to_context_with_policy 的 extern static 冲突"
              fi
            }

            fix_sukisu_fdinfo_mask_decl() {
              if [ "${{ inputs.ksu_variant }}" != "SukiSU" ]; then
                return 0
              fi

              local file="./fs/notify/fdinfo.c"
              [ -f "$file" ] || return 0

              python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("./fs/notify/fdinfo.c")
          lines = path.read_text().splitlines(keepends=True)

          start = None
          for index, line in enumerate(lines):
              if re.match(r"\s*static\s+void\s+inotify_fdinfo\s*\(", line):
                  start = index
                  break

          if start is None:
              raise SystemExit(0)

          brace_line = None
          for index in range(start, len(lines)):
              if "{" in lines[index]:
                  brace_line = index
                  break

          if brace_line is None:
              raise SystemExit(0)

          depth = 0
          end = None
          for index in range(brace_line, len(lines)):
              depth += lines[index].count("{")
              depth -= lines[index].count("}")
              if index > brace_line and depth <= 0:
                  end = index
                  break

          if end is None:
              raise SystemExit(0)

          body = "".join(lines[brace_line + 1:end])
          if "mask, mark->ignored_mask" not in body:
              raise SystemExit(0)

          decl_re = re.compile(r"^\s*u32\s+mask\s*(?:=\s*mark->mask\s*&\s*IN_ALL_EVENTS)?\s*;\s*(?:/\*.*\*/\s*)?$")
          new_body = [
              line for line in lines[brace_line + 1:end]
              if not decl_re.match(line)
          ]
          new_lines = (
              lines[:brace_line + 1]
              + ["\tu32 mask = mark->mask & IN_ALL_EVENTS;\n"]
              + new_body
              + lines[end:]
          )

          if new_lines != lines:
              path.write_text("".join(new_lines))
              print("已修复 SukiSU fdinfo.c 中 mask 声明作用域")
          else:
              print("SukiSU fdinfo.c mask 声明无需修改")
          PY
            }

            # Android 12 - 5.10 修复
            if [[ "${{ inputs.android_version }}" == "android12" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
              if sub_in_range "$CURRENT_SUB" 43 117; then
                fix_task_mmu_show_pad
                apply_susfs_optional_patch "Android 12 - 5.10 fdinfo.c" "a12-5.10/fdinfo.c.patch"
                fix_sukisu_fdinfo_mask_decl
                apply_susfs_base_patch "Android 12 - 5.10 base.c" "a12-5.10/base.c.patch"
                if [[ "${{ inputs.ksu_variant }}" == "SukiSU" && "${{ inputs.use_bbg }}" == "true" ]]; then
                  fix_proc_base_missing_vma_decl
                fi
                if [[ "${{ inputs.ksu_variant }}" == "Official" && "${{ inputs.use_bbg }}" == "true" ]]; then
                  fix_proc_base_missing_vma_decl
                fi
                if [[ "${{ inputs.ksu_variant }}" == "ReSukiSU" ]]; then
                  fix_proc_base_missing_vma_decl
                fi
              fi
            fi

            # Android 13 - 5.15 修复
            if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" ]]; then
              if sub_in_range "$CURRENT_SUB" 41 137; then
                apply_susfs_optional_patch "Android 13 - 5.15 namespace.c" "a13-5.15/namespace.c.patch"
                if [[ "$CURRENT_SUB" -eq 41 ]] && grep -qF 'static_branch_unlikely(&susfs_is_sdcard_android_data_not_decrypted)' ./fs/namespace.c; then
                  if grep -qF 'extern bool susfs_is_sdcard_android_data_decrypted __read_mostly;' ./fs/namespace.c \
                    && ! grep -qF 'extern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;' ./fs/namespace.c; then
                    sed -i 's/extern bool susfs_is_sdcard_android_data_decrypted __read_mostly;/extern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;/' ./fs/namespace.c
                  elif ! grep -qF 'extern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;' ./fs/namespace.c; then
                    sed -i '/extern bool susfs_is_current_ksu_domain(void);/a extern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;' ./fs/namespace.c
                  fi
                  echo "已修复 android13-5.15.41 namespace.c 的 SUSFS sdcard static key 声明"
                fi
                if [[ "$CURRENT_SUB" -eq 41 ]]; then
                  if [ -f ./fs/susfs.c ] && grep -qF 'i_user_ns(' ./fs/susfs.c; then
                    sed -i 's/i_user_ns(&fi->inode)/fi->inode.i_sb->s_user_ns/g' ./fs/susfs.c
                    sed -i 's/i_user_ns(inode)/inode->i_sb->s_user_ns/g' ./fs/susfs.c
                    echo "已修复 android13-5.15.41 fs/susfs.c 缺少 i_user_ns helper"
                  fi
                  if grep -qF 'static DEFINE_IDA(susfs_mnt_id_ida);' ./fs/namespace.c \
                    && [ "$(grep -F 'susfs_mnt_id_ida' ./fs/namespace.c | wc -l)" -eq 1 ]; then
                    sed -i '/static DEFINE_IDA(susfs_mnt_id_ida);/d' ./fs/namespace.c
                    echo "已移除 android13-5.15.41 namespace.c 未使用的 susfs_mnt_id_ida"
                  fi
                  if grep -qF 'static DEFINE_IDA(susfs_mnt_group_ida);' ./fs/namespace.c \
                    && [ "$(grep -F 'susfs_mnt_group_ida' ./fs/namespace.c | wc -l)" -eq 1 ]; then
                    sed -i '/static DEFINE_IDA(susfs_mnt_group_ida);/d' ./fs/namespace.c
                    echo "已移除 android13-5.15.41 namespace.c 未使用的 susfs_mnt_group_ida"
                  fi
                fi
                apply_susfs_optional_patch "Android 13 - 5.15 fdinfo.c" "a13-5.15/fdinfo.c.patch"
                fix_sukisu_fdinfo_mask_decl
                apply_susfs_optional_patch "Android 13 - 5.15 open.c" "a13-5.15/open.c.patch"
                if [[ "${{ inputs.os_patch_level }}" != "2024-05" ]]; then
                  fix_task_mmu_show_pad
                fi
              fi
            fi

            # Android 14 - 6.1 修复
            if [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" ]]; then
              if sub_in_range "$CURRENT_SUB" 25 162; then
                apply_susfs_base_patch "Android 14 - 6.1 base.c" "a14-6.1/base.c.patch"
                if grep -q 'susfs_is_current_proc_umounted\|SUSFS_IS_INODE_SUS_MAP\|SUSFS_IS_INODE_OPEN_REDIRECT' ./fs/proc/base.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/proc/base.c; then
                  if grep -qF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
                    sed -i '/#include <linux\/dma-buf.h>/a #if defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)\n#include <linux\/susfs_def.h>\n#endif' ./fs/proc/base.c
                  else
                    sed -i '/#include <linux\/cpufreq_times.h>/a #if defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)\n#include <linux\/susfs_def.h>\n#endif' ./fs/proc/base.c
                  fi
                fi
                if [[ "${{ inputs.os_patch_level }}" != "2024-05" ]]; then
                  fix_task_mmu_show_pad
                fi
                # 修复 6.1 LTS: SUSFS 补丁在 namespace.c 头部 hunk 因上下文不匹配而失败，
                # 导致函数体中的 SUSFS 符号（DEFAULT_KSU_MNT_ID 等）未声明
                if grep -q 'DEFAULT_KSU_MNT_ID\|susfs_mnt_id_ida' ./fs/namespace.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/namespace.c; then
                  echo "检测到 namespace.c 缺少 susfs_def.h，注入声明..."
                  sed -i '/#include <linux\/mnt_idmapping.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n#include <linux\/susfs_def.h>\n#endif' ./fs/namespace.c
                  if ! grep -q 'extern bool susfs_is_current_ksu_domain' ./fs/namespace.c; then
                    sed -i '/#include "internal.h"/a \\n#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\nextern bool susfs_is_current_ksu_domain(void);\nextern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;\n\n#define CL_COPY_MNT_NS BIT(25)\n\n#endif' ./fs/namespace.c
                  fi
                fi
              fi
            fi

            # Android 15 - 6.6 修复
            if [[ "${{ inputs.android_version }}" == "android15" && "${{ inputs.kernel_version }}" == "6.6" ]]; then
              if [[ "${{ inputs.ksu_variant }}" == "Official" ]] && { sub_in_range "$CURRENT_SUB" 50 58 || sub_in_range "$CURRENT_SUB" 98 127; }; then
                fix_selinux_extern_static
              fi
              if sub_in_range "$CURRENT_SUB" 98 127; then
                apply_susfs_base_patch "Android 15 - 6.6 base.c" "a15-6.6/base.c.patch"
              fi
              # 修复 fs/proc/base.c 缺少 susfs_def.h (不限 sublevel，检测到宏调用但缺头文件时注入)
              if grep -q 'AS_FLAGS_SUS_MAP\|susfs_is_current_proc_umounted\|SUSFS_IS_INODE_SUS_MAP\|SUSFS_IS_INODE_OPEN_REDIRECT' ./fs/proc/base.c && ! grep -qF 'susfs_def.h' ./fs/proc/base.c; then
                if ! grep -qF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
                  sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
                fi
                sed -i '/#include <linux\/dma-buf.h>/a #endif' ./fs/proc/base.c
                sed -i '/#include <linux\/dma-buf.h>/a #include <linux\/susfs_def.h>' ./fs/proc/base.c
                sed -i '/#include <linux\/dma-buf.h>/a #if defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)' ./fs/proc/base.c
              fi
              if sub_in_range "$CURRENT_SUB" 50 58; then
                apply_susfs_optional_patch "Android 15 - 6.6 task_mmu.c" "a15-6.6/task_mmu.c.patch"
                fix_task_mmu_unused_vma_decl
                fix_memory_missing_susfs_def
              fi
            fi

            # Android 16 - 6.12 修复
            if [[ "${{ inputs.android_version }}" == "android16" && "${{ inputs.kernel_version }}" == "6.12" ]]; then
              # 修复 setuid_hook.c 重复定义
              SETUID_HOOK="$KERNEL_ROOT/common/drivers/kernelsu/setuid_hook.c"
              if [ -f "$SETUID_HOOK" ]; then
                sed -i 's/defined(CONFIG_KSU_MANUAL_HOOK))/!defined(CONFIG_KSU_SUSFS) \&\& defined(CONFIG_KSU_MANUAL_HOOK))/' "$SETUID_HOOK"
                echo "已修复 setuid_hook.c 重复定义问题"
              fi

              # 修复 6.12.58+: exec.c 头部上下文变化导致 SUSFS 补丁漏掉 susfs_def.h
              if grep -q 'susfs_is_current_proc_umounted' ./fs/exec.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/exec.c; then
                if grep -qF '#include <linux/dma-buf.h>' ./fs/exec.c; then
                  sed -i '/#include <linux\/dma-buf.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' ./fs/exec.c
                else
                  sed -i '/#include <linux\/ksm.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' ./fs/exec.c
                fi
                echo "已修复 exec.c 缺少 susfs_def.h 问题"
              fi
            fi
          fi

      - name: 注入 SukiSU SUSFS Kconfig
        if: inputs.enable_susfs && inputs.ksu_variant == 'SukiSU'
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -euo pipefail
          KSU_KERNEL_DIR=""
          for dir in ./common/drivers/kernelsu ./drivers/kernelsu ./KernelSU/kernel ./kernel; do
            if [ -f "$dir/Kconfig" ]; then
              KSU_KERNEL_DIR="$dir"
              break
            fi
          done
          if [ -z "$KSU_KERNEL_DIR" ]; then
            echo "::error::未找到 SukiSU Kconfig，无法注入 SUSFS Kconfig 符号"
            exit 1
          fi

          python3 - "$KSU_KERNEL_DIR/Kconfig" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text()
          if "config KSU_SUSFS" in text:
              print(f"{path} 已包含 SUSFS Kconfig 符号")
              raise SystemExit(0)

          options = [
              ("KSU_SUSFS", "KernelSU addon - SUSFS", ["KSU", "THREAD_INFO_IN_TASK"]),
              ("KSU_SUSFS_SUS_PATH", "Enable to hide suspicious path", ["KSU_SUSFS"]),
              ("KSU_SUSFS_SUS_MOUNT", "Enable to hide suspicious mounts", ["KSU_SUSFS"]),
              ("KSU_SUSFS_SUS_KSTAT", "Enable to spoof suspicious kstat", ["KSU_SUSFS"]),
              ("KSU_SUSFS_SPOOF_UNAME", "Enable to spoof uname", ["KSU_SUSFS"]),
              ("KSU_SUSFS_ENABLE_LOG", "Enable logging susfs log to kernel", ["KSU_SUSFS"]),
              ("KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS", "Enable to hide ksu and susfs symbols", ["KSU_SUSFS"]),
              ("KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG", "Enable to spoof cmdline or bootconfig", ["KSU_SUSFS"]),
              ("KSU_SUSFS_OPEN_REDIRECT", "Enable to redirect opened paths", ["KSU_SUSFS"]),
              ("KSU_SUSFS_SUS_MAP", "Enable to hide suspicious maps", ["KSU_SUSFS"]),
          ]

          lines = ["", 'menu "KernelSU - SUSFS"']
          for name, prompt, deps in options:
              lines.extend([f"config {name}", f'  bool "{prompt}"'])
              lines.extend(f"  depends on {dep}" for dep in deps)
              lines.extend(["  default y", ""])
          lines.append("endmenu")
          block = "\n".join(lines)

          marker = "\nendmenu\n"
          if marker in text:
              text = text.rsplit(marker, 1)[0].rstrip() + "\n" + block + marker
          else:
              text = text.rstrip() + "\n" + block + "\n"
          path.write_text(text)
          print(f"已注入 {path} 的 SukiSU SUSFS Kconfig 符号")
          PY

      - name: 注入 SukiSU/ReSukiSU KPM Kconfig
        if: inputs.use_kpm && (inputs.ksu_variant == 'SukiSU' || inputs.ksu_variant == 'ReSukiSU')
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -euo pipefail
          KSU_KERNEL_DIR=""
          for dir in ./common/drivers/kernelsu ./drivers/kernelsu ./KernelSU/kernel ./kernel; do
            if [ -f "$dir/Kconfig" ]; then
              KSU_KERNEL_DIR="$dir"
              break
            fi
          done
          if [ -z "$KSU_KERNEL_DIR" ]; then
            echo "::error::未找到 ${{ inputs.ksu_variant }} Kconfig，无法注入 KPM Kconfig 符号"
            exit 1
          fi

          {
            echo "ABK_KPM_KCONFIG_DIR=$KSU_KERNEL_DIR"
            echo "ABK_KPM_KCONFIG_PATH=$KSU_KERNEL_DIR/Kconfig"
          } >> "$GITHUB_ENV"

          python3 - "$KSU_KERNEL_DIR/Kconfig" "$GITHUB_ENV" <<'PY'
          from pathlib import Path
          import re
          import sys

          path = Path(sys.argv[1])
          github_env = Path(sys.argv[2])
          text = path.read_text()
          pattern = re.compile(r"(?m)^[ \t]*config[ \t]+KPM\b")
          if pattern.search(text):
              with github_env.open("a", encoding="utf-8") as handle:
                  handle.write("ABK_KPM_KCONFIG_STATUS=native\n")
                  handle.write("ABK_KPM_KCONFIG_READY=true\n")
              print(f"{path} 已包含 KPM Kconfig 符号")
              raise SystemExit(0)

          lines = [
              "",
              'menu "KernelSU - KPM"',
              "config KPM",
              '  bool "KernelPatch Module support"',
              "  depends on KSU",
              "  default y",
              "",
              "endmenu",
          ]
          block = "\n".join(lines)

          marker = "\nendmenu\n"
          if marker in text:
              text = text.rsplit(marker, 1)[0].rstrip() + "\n" + block + marker
          else:
              text = text.rstrip() + "\n" + block + "\n"
          path.write_text(text)

          final_text = path.read_text()
          if not pattern.search(final_text):
              raise SystemExit(f"{path} 注入后仍缺少 config KPM")

          with github_env.open("a", encoding="utf-8") as handle:
              handle.write("ABK_KPM_KCONFIG_STATUS=injected\n")
              handle.write("ABK_KPM_KCONFIG_READY=true\n")
          print(f"已注入 {path} 的 KPM Kconfig 符号")
          PY

      - name: 应用 Kernel 特定补丁
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          # 修复指定 2024-11 分支: mmap.c 调用了 vm_flags_clear()，但同分支 mm.h 未提供 helper
          if [[ "${{ inputs.os_patch_level }}" == "2024-11" ]] \
            && { [[ "${{ inputs.android_version }}" == "android12" && "${{ inputs.kernel_version }}" == "5.10" && "${{ inputs.sub_level }}" == "226" ]] \
              || [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" && "${{ inputs.sub_level }}" == "167" ]] \
              || [[ "${{ inputs.android_version }}" == "android15" && "${{ inputs.kernel_version }}" == "6.6" ]]; } \
            && grep -qF 'vm_flags_clear(new_vma, VM_PAD_MASK);' ./mm/mmap.c \
            && ! grep -qF 'static inline void vm_flags_clear(' ./include/linux/mm.h; then
            python3 - "${{ inputs.kernel_version }}" <<'PY'
          import sys
          from pathlib import Path

          kernel_version = sys.argv[1]
          path = Path("include/linux/mm.h")
          text = path.read_text()
          if kernel_version in {"5.10", "5.15"}:
              helper = """
          static inline void vm_flags_clear(struct vm_area_struct *vma,
                                            vm_flags_t flags)
          {
              vma->vm_flags &= ~flags;
          }
          """
          else:
              helper = """
          static inline void vm_flags_clear(struct vm_area_struct *vma,
                                            vm_flags_t flags)
          {
              vma_start_write(vma);
              ACCESS_PRIVATE(vma, __vm_flags) &= ~flags;
          }
          """

          if "static inline void vm_flags_clear(" not in text:
              marker = "/*\n * Use only if VMA is not part of the VMA tree"
              if marker in text:
                  text = text.replace(marker, helper + "\n" + marker, 1)
              else:
                  needle = "static inline void vm_flags_set(struct vm_area_struct *vma,"
                  start = text.find(needle)
                  if start != -1:
                      body_start = text.find("{", start)
                      body_end = text.find("\n}\n", body_start)
                      if body_start == -1 or body_end == -1:
                          raise SystemExit("include/linux/mm.h vm_flags_set() has unexpected format")
                      insert_at = body_end + len("\n}\n")
                  elif "#endif /* _LINUX_MM_H */" in text:
                      insert_at = text.rfind("#endif /* _LINUX_MM_H */")
                  elif "#endif" in text:
                      insert_at = text.rfind("#endif")
                  else:
                      raise SystemExit("include/linux/mm.h missing insertion anchor for vm_flags_clear()")
                  text = text[:insert_at] + helper + text[insert_at:]
              path.write_text(text)
          PY
            echo "已为 ${{ inputs.android_version }}-${{ inputs.kernel_version }} 2024-11 补充 vm_flags_clear helper"
          fi

      - name: 备份基准 defconfig
        run: cp "$DEFCONFIG" "$DEFCONFIG.orig"

      - name: 应用 NTsync 补丁
        if: ${{ inputs.use_ntsync }}
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          set -euo pipefail

          ensure_defconfig_value() {
            local cfg="$1"
            local value="$2"
            local line="${cfg}=${value}"

            if grep -qxF "$line" "$DEFCONFIG"; then
              return 0
            fi

            if grep -Eq "^${cfg}=|^# ${cfg} is not set$" "$DEFCONFIG"; then
              sed -i -E "s|^${cfg}=.*|${line}|; s|^# ${cfg} is not set$|${line}|" "$DEFCONFIG"
            else
              echo "$line" >> "$DEFCONFIG"
            fi
          }

          echo "启用 NTsync 补丁"
          echo "应用基础补丁: ntsync_base.patch..."
          patch -p1 --forward < $KERNEL_PATCHES/common/ntsync/ntsync_base.patch || true
          # 根据 Android 版本和 Kernel 版本应用对应的兼容性补丁
          PATCH_FILE="$KERNEL_PATCHES/common/ntsync/ntsync_compat_${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch"
          echo "应用版本补丁: ntsync_compat_${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch"
          patch -p1 --forward < "$PATCH_FILE" || true
          ensure_defconfig_value CONFIG_NTSYNC y
          echo "应用 NTsync 补丁完成"

      - name: 应用 Networking 增强 (IPSet + BBR)
        if: ${{ inputs.use_networking }}
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          set -euo pipefail

          ensure_defconfig_value() {
            local cfg="$1"
            local value="$2"
            local line="${cfg}=${value}"

            if grep -qxF "$line" "$DEFCONFIG"; then
              return 0
            fi

            if grep -Eq "^${cfg}=|^# ${cfg} is not set$" "$DEFCONFIG"; then
              sed -i -E "s|^${cfg}=.*|${line}|; s|^# ${cfg} is not set$|${line}|" "$DEFCONFIG"
            else
              echo "$line" >> "$DEFCONFIG"
            fi
          }

          echo " 添加IP SET & IPv6_NAT 支持"
          ensure_defconfig_value CONFIG_IP_SET y
          ensure_defconfig_value CONFIG_IP_SET_MAX 65534
          ensure_defconfig_value CONFIG_IP_SET_BITMAP_IP y
          ensure_defconfig_value CONFIG_IP_SET_BITMAP_IPMAC y
          ensure_defconfig_value CONFIG_IP_SET_BITMAP_PORT y
          ensure_defconfig_value CONFIG_IP_SET_HASH_IP y
          ensure_defconfig_value CONFIG_IP_SET_HASH_IPMARK y
          ensure_defconfig_value CONFIG_IP_SET_HASH_IPPORT y
          ensure_defconfig_value CONFIG_IP_SET_HASH_IPPORTIP y
          ensure_defconfig_value CONFIG_IP_SET_HASH_IPPORTNET y
          ensure_defconfig_value CONFIG_IP_SET_HASH_IPMAC y
          ensure_defconfig_value CONFIG_IP_SET_HASH_MAC y
          ensure_defconfig_value CONFIG_IP_SET_HASH_NETPORTNET y
          ensure_defconfig_value CONFIG_IP_SET_HASH_NET y
          ensure_defconfig_value CONFIG_IP_SET_HASH_NETNET y
          ensure_defconfig_value CONFIG_IP_SET_HASH_NETPORT y
          ensure_defconfig_value CONFIG_IP_SET_HASH_NETIFACE y
          ensure_defconfig_value CONFIG_IP_SET_LIST_SET y
          ensure_defconfig_value CONFIG_NETFILTER_XT_MATCH_ADDRTYPE y
          ensure_defconfig_value CONFIG_NETFILTER_XT_SET y
          ensure_defconfig_value CONFIG_IP6_NF_NAT y
          ensure_defconfig_value CONFIG_IP6_NF_TARGET_MASQUERADE y
          if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
            echo "应用 5.10 特殊配置 "
            sed -i 's/CONFIG_IP_SET_MAX/65534/g' net/netfilter/ipset/ip_set_core.c
          fi

          echo " 添加 TCP Congestion Control (BBR) 支持"
          # 应用 BBRv3 补丁仅有6.1版本
          if [ "${{ inputs.kernel_version }}" = "6.1" && false ]; then
            echo "应用 BBRv3 补丁"
            PATCH_FILE="$KERNEL_PATCHES/bbr/bbrv3-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch"
            echo "→ 应用补丁: bbrv3-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch"
            patch -p1 --forward < "$PATCH_FILE" || true
          fi

          ensure_defconfig_value CONFIG_TCP_CONG_ADVANCED y
          if [ -f net/ipv4/Kconfig ] && grep -q '^config TCP_CONG_BIC$' net/ipv4/Kconfig; then
            ensure_defconfig_value CONFIG_TCP_CONG_BIC y
          fi
          ensure_defconfig_value CONFIG_TCP_CONG_BBR y
          ensure_defconfig_value CONFIG_TCP_CONG_CUBIC y
          ensure_defconfig_value CONFIG_TCP_CONG_WESTWOOD y
          ensure_defconfig_value CONFIG_TCP_CONG_HTCP y
          ensure_defconfig_value CONFIG_DEFAULT_BBR y
          ensure_defconfig_value CONFIG_DEFAULT_TCP_CONG '"bbr"'
          ensure_defconfig_value CONFIG_NET_SCH_FQ y
          ensure_defconfig_value CONFIG_NET_SCH_FQ_CODEL y

          echo "✓ Networking配置完成"

      - name: 克隆虚拟化支持补丁仓库
        if: inputs.virtualization_support != 'off'
        run: |
          git clone --depth 1 https://github.com/ravindu644/Droidspaces-OSS.git /tmp/virtualization-support-patches
          echo "VIRTUALIZATION_SUPPORT_PATCHES=/tmp/virtualization-support-patches/Documentation/resources/kernel-patches/GKI" >> $GITHUB_ENV

      - name: 集成虚拟化支持
        if: inputs.virtualization_support != 'off'
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          set -euo pipefail
          KERNEL_VER="${{ inputs.kernel_version }}"
          SLOT="${{ inputs.virtualization_support }}"

          fail() {
            echo "::error::虚拟化支持: $*"
            exit 1
          }

          try_apply_patch() {
            local patch_file="$1"
            local name
            name="$(basename "$patch_file")"
            if patch -p1 --forward --dry-run < "$patch_file" >/dev/null 2>&1; then
              patch -p1 --forward < "$patch_file"
              echo "已应用虚拟化支持 patch: $name"
              return 0
            fi
            if patch -p1 --reverse --dry-run < "$patch_file" >/dev/null 2>&1; then
              echo "虚拟化支持 patch 已应用: $name"
              return 0
            fi
            return 1
          }

          apply_sysvipc_below_612_compat() {
            local sched="include/linux/sched.h"
            [ -f "$sched" ] || fail "缺少 $sched"
            if grep -qF 'ANDROID_KABI_USE(6, struct sysv_sem sysvsem);' "$sched"; then
              echo "SYSVIPC below-6.12 kABI fallback 已应用"
              return 0
            fi
            perl -0pi -e 's/#ifdef CONFIG_SYSVIPC\n\tstruct sysv_sem\s+sysvsem;\n\tstruct sysv_shm\s+sysvshm;\n#endif/#ifdef CONFIG_SYSVIPC\n\t\/\/ struct sysv_sem\t\t\tsysvsem;\n\t\/\/ struct sysv_shm\t\t\tsysvshm;\n#endif/s' "$sched"
            perl -0pi -e 's/\tANDROID_KABI_RESERVE\(6\);\n\tANDROID_KABI_RESERVE\(7\);\n\tANDROID_KABI_RESERVE\(8\);/\n#ifdef CONFIG_SYSVIPC\n\tANDROID_KABI_USE(6, struct sysv_sem sysvsem);\n\t_ANDROID_KABI_REPLACE(ANDROID_KABI_RESERVE(7); ANDROID_KABI_RESERVE(8), struct sysv_shm sysvshm);\n#else\n\tANDROID_KABI_RESERVE(6);\n\tANDROID_KABI_RESERVE(7);\n\tANDROID_KABI_RESERVE(8);\n#endif/s' "$sched"
            grep -qF '// struct sysv_sem' "$sched" || fail "SYSVIPC 原字段注释失败"
            grep -qF 'ANDROID_KABI_USE(6, struct sysv_sem sysvsem);' "$sched" || fail "SYSVIPC kABI fallback 注入失败"
            echo "已应用 SYSVIPC below-6.12 kABI fallback"
          }

          apply_mqueue_510_compat() {
            local user_h="include/linux/sched/user.h"
            [ -f "$user_h" ] || fail "缺少 $user_h"
            if grep -qF 'ANDROID_KABI_USE(1, unsigned long mq_bytes);' "$user_h"; then
              echo "POSIX_MQUEUE kABI fallback 已应用"
              return 0
            fi
            perl -0pi -e 's/#ifdef CONFIG_POSIX_MQUEUE\n\t\/\* protected by mq_lock\t\*\/\n\tunsigned long mq_bytes;\t\/\* How many bytes can be allocated to mqueue\? \*\/\n#endif/#ifdef CONFIG_POSIX_MQUEUE\n\t\/\* protected by mq_lock\t\*\/\n\t\/\/unsigned long mq_bytes;\t\/\* How many bytes can be allocated to mqueue? \*\/\n#endif/s' "$user_h"
            perl -0pi -e 's/\tANDROID_KABI_RESERVE\(1\);\n\tANDROID_KABI_RESERVE\(2\);\n\tANDROID_OEM_DATA_ARRAY\(1, 2\);/\n#if defined(CONFIG_POSIX_MQUEUE)\n\tANDROID_KABI_USE(1, unsigned long mq_bytes);\n\tANDROID_KABI_RESERVE(2);\n\tANDROID_OEM_DATA_ARRAY(1, 2);\n#else\n\tANDROID_KABI_RESERVE(1);\n\tANDROID_KABI_RESERVE(2);\n\tANDROID_OEM_DATA_ARRAY(1, 2);\n#endif/s' "$user_h"
            grep -qF 'ANDROID_KABI_USE(1, unsigned long mq_bytes);' "$user_h" || fail "POSIX_MQUEUE kABI fallback 注入失败"
            echo "已应用 POSIX_MQUEUE 5.10 kABI fallback"
          }

          apply_sysvipc_612_plus_compat() {
            local sched="include/linux/sched.h"
            [ -f "$sched" ] || fail "缺少 $sched"
            if grep -qF 'char __kabi_ignored_0;' "$sched"; then
              echo "SYSVIPC 6.12+ kABI fallback 已应用"
              return 0
            fi
            perl -0pi -e 's/(\n\tunsigned int\s+rt_priority;\n)/$1\n#ifdef CONFIG_SYSVIPC\n\tunion {\n\t\tchar __kabi_ignored_0;\n\t\tstruct sysv_sem\t\t\tsysvsem;\n\t}__attribute__((packed));\n\tunion {\n\t\tchar __kabi_ignored_1;\n\t\tstruct sysv_shm\t\t\tsysvshm;\n\t}__attribute__((packed));\n#endif\n/s or die "rt_priority anchor not found\n";' "$sched" || fail "SYSVIPC 6.12+ packed 字段注入失败"
            perl -0pi -e 's/#ifdef CONFIG_SYSVIPC\n\tstruct sysv_sem\s+sysvsem;\n\tstruct sysv_shm\s+sysvshm;\n#endif/#ifdef CONFIG_SYSVIPC\n\t\/\/ struct sysv_sem\t\t\tsysvsem;\n\t\/\/ struct sysv_shm\t\t\tsysvshm;\n#endif/s' "$sched"
            grep -qF 'char __kabi_ignored_0;' "$sched" || fail "SYSVIPC 6.12+ ignored 字段注入失败"
            grep -qF '// struct sysv_sem' "$sched" || fail "SYSVIPC 6.12+ 原字段注释失败"
            echo "已应用 SYSVIPC 6.12+ kABI fallback"
          }

          case "$KERNEL_VER" in
            6.12)
              PATCH_FILE="$VIRTUALIZATION_SUPPORT_PATCHES/kernel-6.12/001.GKI-6.12-or-above-fix_sysvipc_kabi.patch"
              if ! try_apply_patch "$PATCH_FILE"; then
                apply_sysvipc_612_plus_compat
              fi
              ;;
            5.10|5.15|6.1|6.6)
              case "$SLOT" in
                678|123|345) ;;
                *) fail "$KERNEL_VER 需要选择 678、123 或 345 槽位，当前为 $SLOT" ;;
              esac
              SLOT_NAME=$(echo "$SLOT" | sed 's/\(.\)/\1_/g; s/_$//')
              PATCH_FILE="$VIRTUALIZATION_SUPPORT_PATCHES/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_${SLOT_NAME}.patch"
              if ! try_apply_patch "$PATCH_FILE"; then
                if [ "$SLOT" = "678" ]; then
                  apply_sysvipc_below_612_compat
                else
                  fail "SYSVIPC kABI patch 应用失败: $(basename "$PATCH_FILE")"
                fi
              fi
              ;;
            *)
              fail "未适配的内核版本 $KERNEL_VER"
              ;;
          esac

          # 5.10 及以下还需要 POSIX_MQUEUE 的 kABI 修复
          if [ "$KERNEL_VER" = "5.10" ]; then
            echo "应用虚拟化支持 POSIX_MQUEUE kABI 修复补丁 (5.10)..."
            POSIX_PATCH="$VIRTUALIZATION_SUPPORT_PATCHES/below-kernel-6.12/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch"
            if ! try_apply_patch "$POSIX_PATCH"; then
              apply_mqueue_510_compat
            fi
          fi

          # Android 16 / 6.12 的 rust_binder.ko 在启用 IPC_NS 后会引用
          # init_ipc_ns 与 put_ipc_ns，但当前 AOSP common 分支尚未导出这两个符号。
          # 这里补齐导出，避免 modpost 因 undefined symbol 失败。
          if [ "$KERNEL_VER" = "6.12" ]; then
            if [ -f "ipc/msgutil.c" ] && ! grep -qF 'EXPORT_SYMBOL(init_ipc_ns);' "ipc/msgutil.c"; then
              sed -i '/^struct msg_msgseg {/i EXPORT_SYMBOL(init_ipc_ns);' "ipc/msgutil.c"
              echo "已为 init_ipc_ns 补充符号导出"
            fi

            if [ -f "ipc/namespace.c" ] && ! grep -qF 'EXPORT_SYMBOL(put_ipc_ns);' "ipc/namespace.c"; then
              sed -i '/^static struct ns_common \*ipcns_get(/i EXPORT_SYMBOL(put_ipc_ns);' "ipc/namespace.c"
              echo "已为 put_ipc_ns 补充符号导出"
            fi
          fi

          echo "添加虚拟化支持内核配置..."
          # 按文档规则逐个处理: 已启用则跳过, "# not set" 则替换, 不存在则追加
          enable_config() {
            local cfg="$1"
            if grep -q "^${cfg}=y" "$DEFCONFIG"; then
              echo "  已启用: $cfg"
            elif grep -q "^# ${cfg} is not set" "$DEFCONFIG"; then
              sed -i "s/^# ${cfg} is not set$/${cfg}=y/" "$DEFCONFIG"
              echo "  已切换: $cfg"
            else
              echo "${cfg}=y" >> "$DEFCONFIG"
              echo "  已添加: $cfg"
            fi
          }

          config_defined() {
            local name="${1#CONFIG_}"
            local file
            while IFS= read -r -d '' file; do
              if grep -Eq "^[[:space:]]*(menuconfig|config)[[:space:]]+${name}([[:space:]]|$)" "$file"; then
                return 0
              fi
            done < <(find . -type f -name 'Kconfig*' -print0)
            return 1
          }

          enable_required_config() {
            local cfg="$1"
            if config_defined "$cfg"; then
              enable_config "$cfg"
            else
              fail "当前内核未定义必要配置: $cfg"
            fi
          }

          enable_config_if_defined() {
            local cfg="$1"
            if config_defined "$cfg"; then
              enable_config "$cfg"
            else
              echo "  当前内核未定义: $cfg，跳过"
            fi
          }

          # 必要配置
          enable_required_config CONFIG_SYSVIPC
          enable_required_config CONFIG_POSIX_MQUEUE
          enable_required_config CONFIG_IPC_NS
          enable_required_config CONFIG_PID_NS
          enable_required_config CONFIG_DEVTMPFS
          enable_required_config CONFIG_USER_NS

          # 可选: 网络相关配置 (Docker/NAT 模式)
          enable_config_if_defined CONFIG_NETFILTER_XT_MATCH_ADDRTYPE
          enable_config_if_defined CONFIG_NETFILTER_XT_TARGET_LOG
          enable_config_if_defined CONFIG_NETFILTER_XT_MATCH_RECENT
          enable_config_if_defined CONFIG_IP_SET
          enable_config_if_defined CONFIG_IP_SET_HASH_IP
          enable_config_if_defined CONFIG_IP_SET_HASH_NET
          enable_config_if_defined CONFIG_NETFILTER_XT_SET

          # REJECT 目标在不同内核版本上的符号名可能不同，按实际存在的配置启用
          enable_config_if_defined CONFIG_NETFILTER_XT_TARGET_REJECT
          enable_config_if_defined CONFIG_IP_NF_TARGET_REJECT

          echo "虚拟化支持集成完成"

      - name: 应用 Unicode 绕过修复
        if: inputs.enable_susfs
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          if [ "${{ inputs.kernel_version }}" = "5.10" ] || [ "${{ inputs.kernel_version }}" = "5.15" ]; then
            patch -p1 --forward < "$ACTION_BUILD/patches/unicode_bypass_fix_6.1-.patch" || true
          else
            patch -p1 --forward < "$ACTION_BUILD/patches/unicode_bypass_fix_6.1+.patch" || true
          fi

      - name: 配置 ZRAM LZ4 补丁栈
        if: ${{ inputs.use_zram && inputs.kernel_version != '6.12' }}
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          echo "升级 LZ4..."
          rm -f lib/lz4/lz4_compress.c lib/lz4/lz4_decompress.c lib/lz4/lz4defs.h lib/lz4/lz4hc_compress.c

          cp -r $ZZH_PATCHES/zram/lz4/* ./lib/lz4/
          cp -r $ZZH_PATCHES/zram/include/linux/* ./include/linux/
          bash $ZZH_PATCHES/zram/apply_lz4_neon.sh

          if [ -f "fs/f2fs/Makefile" ] && ! grep -qF "f2fs-\$(CONFIG_F2FS_IOSTAT) += iostat.o" "fs/f2fs/Makefile"; then
            echo "f2fs-\$(CONFIG_F2FS_IOSTAT) += iostat.o" >> "fs/f2fs/Makefile"
          fi

          cp -r $SUKISU_PATCHES/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r $SUKISU_PATCHES/other/zram/lz4k/lib/* ./lib/
          cp -r $SUKISU_PATCHES/other/zram/lz4k/crypto/* ./crypto/
          cp -r $SUKISU_PATCHES/other/zram/lz4k_oplus ./lib/

          for zram_patch_name in lz4kd.patch lz4k_oplus.patch; do
            zram_patch_file="$SUKISU_PATCHES/other/zram/zram_patch/${{ inputs.kernel_version }}/$zram_patch_name"
            if [ ! -f "$zram_patch_file" ]; then
              echo "::warning::$zram_patch_name 不存在，跳过 ${{ inputs.kernel_version }} 的 SukiSU ZRAM 集成补丁"
              continue
            fi

            cp "$zram_patch_file" ./
            if ! patch -p1 -F 3 < "$zram_patch_name"; then
              echo "::warning::$zram_patch_name 应用失败，可能已应用或上下文不匹配"
            fi
          done

      - name: 修复 6.6 WiFi/蓝牙兼容性（三星 + 小米）
        if: inputs.kernel_version == '6.6'
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          ensure_line_once() {
            local file="$1"
            local line="$2"
            if [ ! -f "$file" ]; then
              echo "::error::文件不存在: $file"
              exit 1
            fi
            if ! grep -qF "$line" "$file"; then
              echo "$line" >> "$file"
            fi
          }

          GALAXY_SYMBOL_LIST="android/abi_gki_aarch64_galaxy"
          XIAOMI_SYMBOL_LIST="android/abi_gki_aarch64_xiaomi"
          DRIVERS_MAKEFILE="drivers/Makefile"
          MIN_KDP_SRC="$KERNEL_PATCHES/samsung/min_kdp/min_kdp.c"
          MIN_KDP_PATCH="$KERNEL_PATCHES/samsung/min_kdp/add-min_kdp-symbols.patch"
          MIN_KDP_DST="drivers/min_kdp.c"

          ensure_line_once "$GALAXY_SYMBOL_LIST" "kdp_set_cred_non_rcu"
          ensure_line_once "$GALAXY_SYMBOL_LIST" "kdp_usecount_dec_and_test"
          ensure_line_once "$GALAXY_SYMBOL_LIST" "kdp_usecount_inc"

          if [ ! -f "$MIN_KDP_PATCH" ]; then
            echo "::error::补丁不存在: $MIN_KDP_PATCH"
            exit 1
          fi
          if patch -p1 --dry-run < "$MIN_KDP_PATCH" >/dev/null 2>&1; then
            patch -p1 --no-backup-if-mismatch < "$MIN_KDP_PATCH"
          else
            echo "min_kdp symbols patch 已应用或当前上下文不匹配，跳过。"
          fi

          if [ ! -f "$MIN_KDP_SRC" ]; then
            echo "::error::文件不存在: $MIN_KDP_SRC"
            exit 1
          fi
          cp "$MIN_KDP_SRC" "$MIN_KDP_DST"
          ensure_line_once "$DRIVERS_MAKEFILE" "obj-y += min_kdp.o"

          ensure_line_once "$XIAOMI_SYMBOL_LIST" "device_find_any_child"

      - name: 配置 ZRAM 选项
        if: ${{ inputs.use_zram && inputs.kernel_version != '6.12' }}
        run: |
          CONFIG_FILE="$DEFCONFIG"

          if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
            cat >> "$CONFIG_FILE" <<'EOF'
          CONFIG_ZSMALLOC=y
          CONFIG_ZRAM=y
          CONFIG_MODULE_SIG=n
          CONFIG_CRYPTO_LZO=y
          CONFIG_ZRAM_DEF_COMP_LZ4KD=y
          EOF
          fi

          if [ "${{ inputs.kernel_version }}" != "6.6" ] && [ "${{ inputs.kernel_version }}" != "5.10" ]; then
            if grep -q "CONFIG_ZSMALLOC" "$CONFIG_FILE"; then
              sed -i 's/CONFIG_ZSMALLOC=m/CONFIG_ZSMALLOC=y/g' "$CONFIG_FILE"
            else
              echo "CONFIG_ZSMALLOC=y" >> "$CONFIG_FILE"
            fi
            sed -i 's/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g' "$CONFIG_FILE"
          fi

          if [ "${{ inputs.kernel_version }}" = "6.6" ]; then
            echo "CONFIG_ZSMALLOC=y" >> "$CONFIG_FILE"
            sed -i 's/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g' "$CONFIG_FILE"
          fi

          if [ "${{ inputs.android_version }}" = "android14" ] || [ "${{ inputs.android_version }}" = "android15" ]; then
            sed -i 's/"drivers\/block\/zram\/zram\.ko",//g; s/"mm\/zsmalloc\.ko",//g' "$KERNEL_ROOT/common/modules.bzl"
          fi

          if grep -q "CONFIG_ZSMALLOC=y" "$CONFIG_FILE" && grep -q "CONFIG_ZRAM=y" "$CONFIG_FILE"; then
            cat "$ZZH_PATCHES/config/zram.config" >> "$CONFIG_FILE"
          fi

          # ---- ZRAM 完整算法支持 ----
          if [ "${EFFECTIVE_ZRAM_FULL_ALGO:-false}" = "true" ]; then
            echo "启用 ZRAM 完整算法支持..."
            cat >> "$CONFIG_FILE" <<'EOF'
          CONFIG_CRYPTO_LZO=y
          CONFIG_CRYPTO_LZ4=y
          CONFIG_CRYPTO_DEFLATE=y
          CONFIG_CRYPTO_ZSTD=y
          CONFIG_ZRAM_DEF_COMP_LZORLE=y
          CONFIG_ZRAM_DEF_COMP="lzo-rle"
          EOF
          elif [ -n "${EFFECTIVE_ZRAM_EXTRA_ALGOS:-}" ]; then
            # ---- 自定义单独算法 ----
            echo "添加自定义 ZRAM 算法: $EFFECTIVE_ZRAM_EXTRA_ALGOS"
            IFS=',' read -ra ALGOS <<< "$EFFECTIVE_ZRAM_EXTRA_ALGOS"
            for raw_algo in "${ALGOS[@]}"; do
              algo=$(echo "$raw_algo" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
              case "$algo" in
                "lzo")        echo "CONFIG_CRYPTO_LZO=y"        >> "$CONFIG_FILE" ;;
                "lz4")        echo "CONFIG_CRYPTO_LZ4=y"        >> "$CONFIG_FILE" ;;
                "lz4hc")      echo "CONFIG_CRYPTO_LZ4HC=y"      >> "$CONFIG_FILE" ;;
                "lz4k")       echo "CONFIG_CRYPTO_LZ4K=y"       >> "$CONFIG_FILE" ;;
                "lz4k_oplus") echo "CONFIG_CRYPTO_LZ4K_OPLUS=y" >> "$CONFIG_FILE" ;;
                "lz4kd")      echo "CONFIG_CRYPTO_LZ4KD=y"      >> "$CONFIG_FILE" ;;
                "deflate")    echo "CONFIG_CRYPTO_DEFLATE=y"    >> "$CONFIG_FILE" ;;
                "842")        echo "CONFIG_CRYPTO_842=y"        >> "$CONFIG_FILE" ;;
                "zstd")       echo "CONFIG_CRYPTO_ZSTD=y"       >> "$CONFIG_FILE" ;;
                *) echo "::warning::未知的 ZRAM 算法: $raw_algo，跳过" ;;
              esac
            done
          fi

      - name: 添加 BBG 防格机补丁
        if: inputs.use_bbg
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          BBG_MAKEFILE="Baseband-guard/Makefile"
          if { { [ "${{ inputs.android_version }}" = "android12" ] && \
                 [ "${{ inputs.kernel_version }}" = "5.10" ]; } || \
               { [ "${{ inputs.android_version }}" = "android13" ] && \
                 [ "${{ inputs.kernel_version }}" = "5.15" ]; }; } && \
             [ -f "$BBG_MAKEFILE" ]; then
            echo "应用 BBG legacy host header 生成兼容修复: ${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}"
            python3 - "$BBG_MAKEFILE" "common/security/selinux" <<'PY'
          import sys
          import re
          from pathlib import Path

          makefile = Path(sys.argv[1])
          selinux_dir = Path(sys.argv[2])
          include_dir = selinux_dir / "include"
          classmap_h = include_dir / "classmap.h"
          initial_sid_h = include_dir / "initial_sid_to_string.h"

          def join_continuations(text):
              lines = []
              buf = ""
              for raw in text.splitlines():
                  line = raw.rstrip()
                  if line.endswith("\\"):
                      buf += line[:-1] + " "
                  else:
                      lines.append(buf + line)
                      buf = ""
              if buf:
                  lines.append(buf)
              return "\n".join(lines)

          def strip_comments(text):
              text = re.sub(r"/\*.*?\*/", "", text, flags=re.S)
              text = re.sub(r"//.*", "", text)
              return text

          classmap_text = strip_comments(join_continuations(classmap_h.read_text(encoding="utf-8")))
          initial_sid_text = strip_comments(join_continuations(initial_sid_h.read_text(encoding="utf-8")))

          macros = {
              name: body.strip()
              for name, body in re.findall(r"^\s*#define\s+([A-Za-z_][A-Za-z0-9_]*)\s+(.+)$", classmap_text, re.M)
          }

          def expand_list(expr, seen=()):
              values = []
              for string_value, ident in re.findall(r'"([^"]+)"|([A-Za-z_][A-Za-z0-9_]*)', expr):
                  if string_value:
                      values.append(string_value.upper())
                  elif ident == "NULL":
                      continue
                  elif ident in macros and ident not in seen:
                      values.extend(expand_list(macros[ident], seen + (ident,)))
              return values

          secclasses = []
          body_match = re.search(r"secclass_map\s*\[\]\s*=\s*\{(.*)\};", classmap_text, re.S)
          if not body_match:
              raise SystemExit("secclass_map not found")

          for class_name, perms_expr in re.findall(r'\{\s*"([^"]+)"\s*,\s*\{(.*?)\}\s*\}', body_match.group(1), re.S):
              secclasses.append((class_name.upper(), expand_list(perms_expr)))

          sid_match = re.search(r"initial_sid_to_string\s*\[\]\s*=\s*\{(.*)\};", initial_sid_text, re.S)
          if not sid_match:
              raise SystemExit("initial_sid_to_string not found")

          initial_sids = []
          for string_value, null_value in re.findall(r'"([^"]+)"|(NULL)', sid_match.group(1)):
              initial_sids.append(string_value.upper() if string_value else None)

          flask_lines = [
              "/* This file is automatically generated. Do not edit. */",
              "#ifndef _SELINUX_FLASK_H_",
              "#define _SELINUX_FLASK_H_",
              "",
          ]
          for idx, (class_name, _) in enumerate(secclasses, 1):
              flask_lines.append(f"#define SECCLASS_{class_name:<39} {idx:2d}")

          flask_lines.append("")
          for idx, sid_name in enumerate(initial_sids):
              if idx and sid_name:
                  flask_lines.append(f"#define SECINITSID_{sid_name:<39} {idx:2d}")

          flask_lines.extend([
              f"\n#define SECINITSID_NUM {len(initial_sids) - 1}",
              "",
              "static inline bool security_is_socket_class(u16 kern_tclass)",
              "{",
              "\tbool sock = false;",
              "",
              "\tswitch (kern_tclass) {",
          ])
          for class_name, _ in secclasses:
              if class_name.endswith("SOCKET"):
                  flask_lines.append(f"\tcase SECCLASS_{class_name}:")
          flask_lines.extend([
              "\t\tsock = true;",
              "\t\tbreak;",
              "\tdefault:",
              "\t\tbreak;",
              "\t}",
              "",
              "\treturn sock;",
              "}",
              "",
              "#endif",
              "",
          ])

          av_lines = [
              "/* This file is automatically generated. Do not edit. */",
              "#ifndef _SELINUX_AV_PERMISSIONS_H_",
              "#define _SELINUX_AV_PERMISSIONS_H_",
              "",
          ]
          for class_name, perms in secclasses:
              for bit, perm in enumerate(perms):
                  if bit >= 32:
                      raise SystemExit(f"too many permissions for {class_name}")
                  pad = " " * max(1, 40 - len(class_name) - len(perm))
                  av_lines.append(f"#define {class_name}__{perm}{pad}0x{1 << bit:08x}U")
          av_lines.extend(["", "#endif", ""])

          (selinux_dir / "flask.h").write_text("\n".join(flask_lines), encoding="utf-8")
          (selinux_dir / "av_permissions.h").write_text("\n".join(av_lines), encoding="utf-8")

          text = makefile.read_text(encoding="utf-8")
          text = text.replace(
              "ifneq ($(wildcard $(objtree)/security/selinux/flask.h),)",
              "ifneq ($(wildcard $(objtree)/security/selinux/flask.h $(srctree)/security/selinux/flask.h),)",
              1,
          )

          makefile.write_text(text, encoding="utf-8")
          PY
          fi
          echo "CONFIG_BBG=y" >> common/arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' common/security/Kconfig

      - name: 添加 DDK 防格机 LSM
        if: inputs.use_ddk
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          echo "应用 Xingguang DDK patch 栈并启用内建 LSM"
          bash "$ZZH_PATCHES/ddk/setup.sh"
          test -f common/include/linux/xingguang_ddk.h
          grep -q '^CONFIG_XINGGUANG_DDK=y$' "$DEFCONFIG" || echo "CONFIG_XINGGUANG_DDK=y" >> "$DEFCONFIG"

      - name: 应用 Re-Kernel
        if: inputs.use_rekernel
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -e
          echo "Integrating Re-Kernel..."
          TMP_REKERNEL=/tmp/rekernel
          rm -rf "$TMP_REKERNEL"
          git clone --depth 1 https://github.com/Sakion-Team/Re-Kernel.git "$TMP_REKERNEL"

          # 准备驱动源码
          mkdir -p common/drivers/rekernel
          cp "$TMP_REKERNEL/LKM-Source/rekernel.c" common/drivers/rekernel/
          cp "$TMP_REKERNEL/LKM-Source/rekernel.h" common/drivers/rekernel/

          # 生成构建配置
          cat > common/drivers/rekernel/Kconfig << 'EOF'
          menu "Re:Kernel"
          config REKERNEL
              bool "Re:Kernel support (GKI Vendor Hooks)"
              default y
              help
                Enable Re-Kernel support via GKI Vendor Hooks.

          config REKERNEL_NETWORK
              bool "Re:Kernel NetReceive unfreeze support"
              depends on REKERNEL
              default n
          endmenu
          EOF

          cat > common/drivers/rekernel/Makefile << 'EOF'
          obj-$(CONFIG_REKERNEL) += rekernel.o
          ccflags-$(CONFIG_REKERNEL_NETWORK) += -DNETWORK_FILTER
          EOF

          # 挂载到驱动树
          if ! grep -qF 'source "drivers/rekernel/Kconfig"' common/drivers/Kconfig; then
            sed -i '/^endmenu$/i source "drivers/rekernel/Kconfig"' common/drivers/Kconfig
          fi
          if ! grep -qF 'obj-$(CONFIG_REKERNEL) += rekernel/' common/drivers/Makefile; then
            echo 'obj-$(CONFIG_REKERNEL) += rekernel/' >> common/drivers/Makefile
          fi

          # 启用内核版本宏
          REKERNEL_H="common/drivers/rekernel/rekernel.h"
          VERSION_MACRO="KERNEL_$(echo "${{ inputs.kernel_version }}" | tr '.' '_')"
          if grep -q "^// #define ${VERSION_MACRO}$" "$REKERNEL_H"; then
            sed -i "s|^// #define ${VERSION_MACRO}$|#define ${VERSION_MACRO}|" "$REKERNEL_H"
          fi

          # 修正头文件包含路径（适配 in-tree 编译）
          sed -i 's|#include <../android/binder_internal.h>|#include "../../drivers/android/binder_internal.h"|g' common/drivers/rekernel/rekernel.c
          # 补齐 binder_internal 依赖（避免 5.10 下 DEFINE_SHOW_ATTRIBUTE 报错）
          grep -qF '#include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c || sed -i '/#include <trace\/hooks\/signal.h>/a #include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c

          # 配置 defconfig（幂等）
          grep -q '^CONFIG_REKERNEL=y$' "$DEFCONFIG" || echo "CONFIG_REKERNEL=y" >> "$DEFCONFIG"
          grep -q '^CONFIG_REKERNEL_NETWORK=y$' "$DEFCONFIG" || echo "CONFIG_REKERNEL_NETWORK=y" >> "$DEFCONFIG"

      - name: 执行自定义外部模块 (after_patch)
        if: inputs.use_custom_external_modules
        env:
          CUSTOM_EXTERNAL_MODULE_STAGE: after_patch
          ABK_BUILD_ANDROID_VERSION: ${{ inputs.android_version }}
          ABK_BUILD_KERNEL_VERSION: ${{ inputs.kernel_version }}
          ABK_BUILD_SUB_LEVEL: ${{ inputs.sub_level }}
          ABK_BUILD_OS_PATCH_LEVEL: ${{ inputs.os_patch_level }}
          ABK_BUILD_REVISION: ${{ inputs.revision }}
          ABK_BUILD_KSU_VARIANT: ${{ inputs.ksu_variant }}
          ABK_BUILD_KSU_BRANCH: ${{ inputs.ksu_branch }}
          ABK_BUILD_VERSION: ${{ inputs.version }}
          ABK_BUILD_TIME: ${{ inputs.build_time }}
          ABK_BUILD_VIRTUALIZATION_SUPPORT: ${{ inputs.virtualization_support }}
          ABK_BUILD_ZRAM_EXTRA_ALGOS: ${{ inputs.zram_extra_algos }}
          ABK_FEATURE_USE_ZRAM: ${{ inputs.use_zram }}
          ABK_FEATURE_USE_BBG: ${{ inputs.use_bbg }}
          ABK_FEATURE_USE_DDK: ${{ inputs.use_ddk }}
          ABK_FEATURE_USE_NTSYNC: ${{ inputs.use_ntsync }}
          ABK_FEATURE_USE_NETWORKING: ${{ inputs.use_networking }}
          ABK_FEATURE_USE_KPM: ${{ inputs.use_kpm }}
          ABK_FEATURE_USE_REKERNEL: ${{ inputs.use_rekernel }}
          ABK_FEATURE_ENABLE_SUSFS: ${{ inputs.enable_susfs }}
          ABK_FEATURE_SUPP_OP: ${{ inputs.supp_op }}
          ABK_FEATURE_ZRAM_FULL_ALGO: ${{ inputs.zram_full_algo }}
        run: |
          set -euo pipefail
          export ABK_BUILD_KSU_BRANCH="${EFFECTIVE_KSU_BRANCH:-$ABK_BUILD_KSU_BRANCH}"

          manifest="$CUSTOM_EXTERNAL_MODULES_MANIFEST"
          if [ ! -s "$manifest" ]; then
            echo "未找到自定义外部模块清单，跳过 $CUSTOM_EXTERNAL_MODULE_STAGE。"
            exit 0
          fi

          executed=0
          while IFS=$'\t' read -r stage module_dir repo_url entry_kind group_repo_url child_id; do
            [ "$stage" = "$CUSTOM_EXTERNAL_MODULE_STAGE" ] || continue

            setup="$module_dir/setup.sh"
            if [ ! -f "$setup" ]; then
              echo "::error::自定义外部模块缺少入口文件 setup.sh: $repo_url ($module_dir)"
              exit 1
            fi

            chmod +x "$setup"
            echo "::group::执行自定义外部模块 [$stage] $repo_url"
            (
              cd "$module_dir"
              export ABK_MODULE_ENTRY_KIND="${entry_kind:-module}"
              export ABK_MODULE_GROUP_REPO_URL="${group_repo_url:-}"
              export ABK_MODULE_CHILD_ID="${child_id:-}"
              bash "$setup"
            )
            echo "::endgroup::"
            executed=$((executed + 1))
          done < "$manifest"

          if [ "$executed" -eq 0 ]; then
            echo "没有配置 $CUSTOM_EXTERNAL_MODULE_STAGE 阶段的自定义外部模块。"
          fi

      - name: 配置内核选项
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -euo pipefail
          kpm_kconfig_status="${ABK_KPM_KCONFIG_STATUS:-unknown}"
          kpm_kconfig_ready="${ABK_KPM_KCONFIG_READY:-false}"
          kpm_kconfig_path="${ABK_KPM_KCONFIG_PATH:-}"

          if [ "${{ inputs.ksu_variant }}" != "None" ]; then
            cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          EOF
          fi

          kpm_config_supported="false"
          if [ "${{ inputs.ksu_variant }}" == "SukiSU" ] || [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ]; then
            if [ "$kpm_kconfig_ready" = "true" ] && [ -f "$kpm_kconfig_path" ]; then
              kpm_config_supported="true"
            else
              for dir in KernelSU/kernel common/drivers/kernelsu drivers/kernelsu kernel; do
              if [ -f "$dir/Kconfig" ] && rg -n '^[[:space:]]*config[[:space:]]+KPM\b' "$dir/Kconfig" >/dev/null 2>&1; then
                kpm_config_supported="true"
                break
              fi
              done
            fi
          fi

          if [ "${{ inputs.use_kpm }}" == "true" ] && { [ "${{ inputs.ksu_variant }}" == "SukiSU" ] || [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ]; }; then
            if [ "$kpm_config_supported" = "true" ]; then
              echo "CONFIG_KPM=y" >> "$DEFCONFIG"
              case "$kpm_kconfig_status" in
                native)
                  echo "检测到原生 KPM Kconfig，已启用 CONFIG_KPM。"
                  ;;
                injected)
                  echo "源码未暴露 KPM Kconfig，已自动注入并启用 CONFIG_KPM。"
                  ;;
                *)
                  echo "检测到 KPM Kconfig，已启用 CONFIG_KPM。"
                  ;;
              esac
            else
              echo "::error::请求启用 KPM，但当前 ${{ inputs.ksu_variant }} 源码树仍未提供 config KPM。"
              exit 1
            fi
          elif [ "${{ inputs.ksu_variant }}" == "SukiSU" ] || [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ]; then
            if [ "$kpm_config_supported" = "true" ]; then
              echo "# CONFIG_KPM is not set" >> "$DEFCONFIG"
              echo "检测到 KPM Kconfig，已显式关闭 CONFIG_KPM。"
            fi
          fi

          if [ "${{ inputs.enable_susfs }}" != "true" ] && { [ "${{ inputs.ksu_variant }}" == "SukiSU" ] || [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ]; }; then
            cat >> "$DEFCONFIG" << 'EOF'
          # CONFIG_KSU_SUSFS is not set
          # CONFIG_KSU_SUSFS_SUS_PATH is not set
          # CONFIG_KSU_SUSFS_SUS_MOUNT is not set
          # CONFIG_KSU_SUSFS_SUS_KSTAT is not set
          # CONFIG_KSU_SUSFS_SPOOF_UNAME is not set
          # CONFIG_KSU_SUSFS_ENABLE_LOG is not set
          # CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS is not set
          # CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG is not set
          # CONFIG_KSU_SUSFS_OPEN_REDIRECT is not set
          # CONFIG_KSU_SUSFS_SUS_MAP is not set
          EOF
          fi

          CURRENT_SUB="${{ inputs.sub_level }}"
          if [[ ! "$CURRENT_SUB" =~ ^[0-9]+$ ]]; then
            CURRENT_SUB=99999
          fi
          if [[ ( "${{ inputs.ksu_variant }}" == "Official" || "${{ inputs.ksu_variant }}" == "ReSukiSU" ) && "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" && "$CURRENT_SUB" -ge 41 && "$CURRENT_SUB" -le 137 ]]; then
            {
              echo "CONFIG_KALLSYMS=y"
              echo "CONFIG_KALLSYMS_ALL=y"
            } >> "$DEFCONFIG"
          fi

          sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: 配置 KPM 超级密码
        if: inputs.use_kpm && inputs.kpm_password != '' && (inputs.ksu_variant == 'SukiSU' || inputs.ksu_variant == 'ReSukiSU')
        run: |
          echo "KPM 超级密码将在 Image KPM patch 阶段写入。"
          echo "CONFIG_KPM_SUPER_KEY 不是当前 KSU Kconfig 符号，不能写入 defconfig fragment。"

      - name: 添加 SUSFS 配置
        if: inputs.enable_susfs && inputs.ksu_variant != 'None'
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          if [ "${{ inputs.ksu_variant }}" == "SukiSU" ]; then
            KSU_SOURCE_DIR=""
            for dir in common/drivers/kernelsu drivers/kernelsu KernelSU/kernel kernel; do
              if [ -f "$dir/infra/symbol_resolver.c" ]; then
                KSU_SOURCE_DIR="$dir"
                break
              fi
            done

            if [ -z "$KSU_SOURCE_DIR" ] \
              || ! grep -qF 'ksu_resolve_symbol_for_functable_hook' "$KSU_SOURCE_DIR/infra/symbol_resolver.c" \
              || ! grep -qF 'find_kernel_symbol_exact' "$KSU_SOURCE_DIR/infra/symbol_resolver.c" \
              || ! grep -qF 'ksu_init_symbol_resolver' "$KSU_SOURCE_DIR/infra/symbol_resolver.c"; then
              echo "::warning::SukiSU 源码仍缺少完整 SUSFS 导出符号，跳过 CONFIG_KSU_SUSFS* 写入以避免链接失败"
              exit 0
            fi
          fi

          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF

      - name: 配置内核名称
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          if [ -f "build/build.sh" ]; then
            sed -i 's/-dirty//' ./common/scripts/setlocalversion
          else
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' ./common/BUILD.bazel
            sed -i '/kmi_symbol_list_strict_mode/d' ./common/BUILD.bazel
            rm -rf ./common/android/abi_gki_protected_exports_*
            sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" ./build/kernel/kleaf/impl/stamp.bzl
          fi

          VERSION_INPUT=$(echo "${{ inputs.version }}" | tr -d '[:space:]')
          if [ -n "$VERSION_INPUT" ]; then
            CLEAN_VERSION=$(echo "$VERSION_INPUT" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+//')
            perl -i -0777 -pe 's/(.*)echo "\$\{KERNELVERSION\}\$\{file_localversion\}\$\{config_localversion\}\$\{LOCALVERSION\}\$\{scm_version\}"/$1echo "\$\{KERNELVERSION\}'"${CLEAN_VERSION}"'"/s' ./common/scripts/setlocalversion 2>/dev/null || true
            sed -i "\$s|echo \"\$res\"|echo \"${CLEAN_VERSION}\"|" ./common/scripts/setlocalversion 2>/dev/null || true
            sed -i '/^CONFIG_LOCALVERSION=/ s/="\([^"]*\)"/="'"$CLEAN_VERSION"'"/' ./common/arch/arm64/configs/gki_defconfig
          elif [ ! -f "build/build.sh" ]; then
            cd ./common
            BID="ab$((RANDOM % 90000000 + 10000000))"
            GHASH=$(git rev-parse --verify HEAD | cut -c1-13)
            case "${{ inputs.android_version }}-${{ inputs.kernel_version }}" in
              "android14-6.1")  KMI_TAG="android14-11" ;;
              "android15-6.6")  KMI_TAG="android15-8" ;;
              "android16-6.12") KMI_TAG="android16-5" ;;
              *) KMI_TAG="${{ inputs.android_version }}" ;;
            esac

            if [ "${{ inputs.kernel_version }}" = "6.1" ]; then
              KMI_LOCAL="-${KMI_TAG}-g${GHASH}-${BID}-4k"
              sed -i "\$s|echo \"\$res\"|echo \"${KMI_LOCAL}\"|" ./scripts/setlocalversion 2>/dev/null || true
              sed -i "/^CONFIG_LOCALVERSION=/ s/=\"[^\"]*\"/=\"${KMI_LOCAL}\"/" ./arch/arm64/configs/gki_defconfig 2>/dev/null || true
            else
              SUFFIX="-${KMI_TAG}-g${GHASH}-${BID}"
              perl -i -0777 -pe 's/(.*)echo "\$\{KERNELVERSION\}\$\{file_localversion\}\$\{config_localversion\}\$\{LOCALVERSION\}\$\{scm_version\}"/$1echo "\$\{KERNELVERSION\}'"${SUFFIX}"'\$\{config_localversion\}"/s' ./scripts/setlocalversion 2>/dev/null || true
            fi
          fi

      - name: 设置自定义构建时间
        shell: bash
        run: |
          INPUT_TIME="${{ inputs.build_time }}"
          if [[ -n "$INPUT_TIME" && "$INPUT_TIME" != "N" && "$INPUT_TIME" != "n" ]]; then
            DATESTR="$INPUT_TIME"
          else
            DATESTR="$(TZ='UTC' date +'%a %b %d %T %Z %Y')"
          fi

          echo "使用构建时间: $DATESTR"
          echo "KBUILD_BUILD_TIMESTAMP=$DATESTR" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_VERSION=1" >> "$GITHUB_ENV"

          # 统一处理 mkcompile_h 补丁
          f="$KERNEL_ROOT/common/scripts/mkcompile_h"
          if [ -f "$f" ]; then
            if [[ "${{ inputs.kernel_version }}" == "5.10" || "${{ inputs.kernel_version }}" == "5.15" ]]; then
              echo "应用 5.x 经典时间戳补丁: $f"
              perl -pi -e "s{UTS_VERSION=\"\\\$\(echo \\\$UTS_VERSION \\\$CONFIG_FLAGS \\\$TIMESTAMP \\| cut -b -\\\$UTS_LEN\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $DATESTR\"}" "$f"
            else
              echo "应用 6.x mkcompile_h 补丁: $f"
              if grep -q 'UTS_VERSION=' "$f"; then
                perl -pi -e "s{UTS_VERSION=\"\\\$\\\(.*?\\\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $DATESTR\"}" "$f"
              else
                perl -0777 -pi -e "s{cat <<EOF}{cat <<EOF\n#undef UTS_VERSION\n#define UTS_VERSION \"#1 SMP PREEMPT $DATESTR\" } unless /UTS_VERSION/" "$f"
              fi
            fi
          fi

      - name: 执行自定义外部模块 (before_build)
        if: inputs.use_custom_external_modules
        env:
          CUSTOM_EXTERNAL_MODULE_STAGE: before_build
          ABK_BUILD_ANDROID_VERSION: ${{ inputs.android_version }}
          ABK_BUILD_KERNEL_VERSION: ${{ inputs.kernel_version }}
          ABK_BUILD_SUB_LEVEL: ${{ inputs.sub_level }}
          ABK_BUILD_OS_PATCH_LEVEL: ${{ inputs.os_patch_level }}
          ABK_BUILD_REVISION: ${{ inputs.revision }}
          ABK_BUILD_KSU_VARIANT: ${{ inputs.ksu_variant }}
          ABK_BUILD_KSU_BRANCH: ${{ inputs.ksu_branch }}
          ABK_BUILD_VERSION: ${{ inputs.version }}
          ABK_BUILD_TIME: ${{ inputs.build_time }}
          ABK_BUILD_VIRTUALIZATION_SUPPORT: ${{ inputs.virtualization_support }}
          ABK_BUILD_ZRAM_EXTRA_ALGOS: ${{ inputs.zram_extra_algos }}
          ABK_FEATURE_USE_ZRAM: ${{ inputs.use_zram }}
          ABK_FEATURE_USE_BBG: ${{ inputs.use_bbg }}
          ABK_FEATURE_USE_DDK: ${{ inputs.use_ddk }}
          ABK_FEATURE_USE_NTSYNC: ${{ inputs.use_ntsync }}
          ABK_FEATURE_USE_NETWORKING: ${{ inputs.use_networking }}
          ABK_FEATURE_USE_KPM: ${{ inputs.use_kpm }}
          ABK_FEATURE_USE_REKERNEL: ${{ inputs.use_rekernel }}
          ABK_FEATURE_ENABLE_SUSFS: ${{ inputs.enable_susfs }}
          ABK_FEATURE_SUPP_OP: ${{ inputs.supp_op }}
          ABK_FEATURE_ZRAM_FULL_ALGO: ${{ inputs.zram_full_algo }}
        run: |
          set -euo pipefail
          export ABK_BUILD_KSU_BRANCH="${EFFECTIVE_KSU_BRANCH:-$ABK_BUILD_KSU_BRANCH}"

          manifest="$CUSTOM_EXTERNAL_MODULES_MANIFEST"
          if [ ! -s "$manifest" ]; then
            echo "未找到自定义外部模块清单，跳过 $CUSTOM_EXTERNAL_MODULE_STAGE。"
            exit 0
          fi

          executed=0
          while IFS=$'\t' read -r stage module_dir repo_url entry_kind group_repo_url child_id; do
            [ "$stage" = "$CUSTOM_EXTERNAL_MODULE_STAGE" ] || continue

            setup="$module_dir/setup.sh"
            if [ ! -f "$setup" ]; then
              echo "::error::自定义外部模块缺少入口文件 setup.sh: $repo_url ($module_dir)"
              exit 1
            fi

            chmod +x "$setup"
            echo "::group::执行自定义外部模块 [$stage] $repo_url"
            (
              cd "$module_dir"
              export ABK_MODULE_ENTRY_KIND="${entry_kind:-module}"
              export ABK_MODULE_GROUP_REPO_URL="${group_repo_url:-}"
              export ABK_MODULE_CHILD_ID="${child_id:-}"
              bash "$setup"
            )
            echo "::endgroup::"
            executed=$((executed + 1))
          done < "$manifest"

          if [ "$executed" -eq 0 ]; then
            echo "没有配置 $CUSTOM_EXTERNAL_MODULE_STAGE 阶段的自定义外部模块。"
          fi

      - name: 修复 Official SUSFS 源码兼容
        if: inputs.ksu_variant == 'Official' && inputs.enable_susfs
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          from textwrap import dedent
          import re

          INIT_BODY = """int __init kernelsu_init(void)
          {
          #ifdef CONFIG_KSU_DEBUG
              pr_alert("*************************************************************");
              pr_alert("**     NOTICE NOTICE NOTICE NOTICE NOTICE NOTICE NOTICE    **");
              pr_alert("**                                                         **");
              pr_alert("**         You are running KernelSU in DEBUG mode          **");
              pr_alert("**                                                         **");
              pr_alert("**     NOTICE NOTICE NOTICE NOTICE NOTICE NOTICE NOTICE    **");
              pr_alert("*************************************************************");
          #endif

              if (allow_shell) {
                  pr_alert("shell is allowed at init!");
              }

              ksu_cred = prepare_creds();
              if (!ksu_cred) {
                  pr_err("prepare cred failed!\\n");
              }

          #ifdef CONFIG_KSU_SUSFS
              susfs_init();
          #endif // #ifdef CONFIG_KSU_SUSFS

              ksu_feature_init();

              ksu_supercalls_init();

              ksu_sucompat_init();

              ksu_setuid_hook_init();

              ksu_sulog_init();

