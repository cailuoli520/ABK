name: 内核构建 - Android 12 (5.10)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_variant:
        description: "KernelSU 变体"
        required: true
        type: choice
        options:
          - None
          - Official
          - SukiSU
          - ReSukiSU
        default: ReSukiSU
      kernelsu_branch:
        description: "KSU 分支"
        required: true
        type: choice
        options:
          - Stable(标准)
          - Dev(开发)
          - Latest(最新)
          - Custom(自定义)
        default: Stable(标准)
      custom_ref:
        description: "自定义引用 (仅在KSU分支为'Custom(自定义)'时使用)"
        required: false 
        type: string
      version:
        description: "自定义版本名 (可选)"
        required: false
        type: string
      build_time:
        description: "自定义构建时间 (可选，N或留空=当前UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      virtualization_support:
        description: "虚拟化支持"
        required: false
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      use_zram:
        description: "启用 ZRAM 增强算法"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "启用 BBG 防格机"
        required: true
        type: boolean
        default: false
      use_ddk:
        description: "启用 DDK 防格机 LSM"
        required: true
        type: boolean
        default: false
      use_ntsync:
        description: "启用 NTsync"
        required: true
        type: boolean
        default: false
      use_networking:
        description: "启用网络增强（IPSet + BBR）"
        required: true
        type: boolean
        default: false
      use_kpm:
        description: "启用 KPM 功能"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "启用 Re-Kernel 驱动"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "禁用 SUSFS"
        required: true
        type: boolean
        default: false
      zram_full_algo:
        description: "启用 ZRAM 完整算法支持（默认 zstdp；6.12 自动跳过 legacy LZ4K/LZ4KD/LZ4K_OPLUS）"
        required: false
        type: boolean
        default: false
      zram_extra_algos:
        description: "自定义 ZRAM 算法（逗号分隔，如 lzo,lz4,deflate,zstd,zstdp；6.12 会忽略 lz4k/lz4kd/lz4k_oplus）"
        required: false
        type: string
        default: ""
      kpm_password:
        description: "自定义 KPM 超级密码（留空=使用默认密码）"
        required: false
        type: string
        default: ""
      use_custom_external_modules:
        description: "启用自定义外部模块注入"
        required: false
        type: boolean
        default: false
      custom_external_modules:
        description: "自定义外部模块（兼容旧 repo;stage，也支持 module:repo;stage 与 set:repo#child;stage，用 | 分隔）"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      kernelsu_variant:
        required: true
        type: string
      kernelsu_branch:
        required: true
        type: string
      custom_ref:
        required: false
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      use_ddk:
        required: false
        type: boolean
        default: false
      use_ntsync:
        required: true
        type: boolean
      use_networking:
        required: true
        type: boolean
      use_kpm:
        required: true
        type: boolean
        default: false
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      virtualization_support:
        required: false
        type: string
        default: "off"
      zram_full_algo:
        required: false
        type: boolean
        default: false
      zram_extra_algos:
        required: false
        type: string
        default: ""
      kpm_password:
        required: false
        type: string
        default: ""
      use_custom_external_modules:
        required: false
        type: boolean
        default: false
      custom_external_modules:
        required: false
        type: string
        default: ""
      called_from_main:
        description: "是否从 main.yml 调用（内部使用）"
        required: false
        type: boolean
        default: false

jobs:
  build-kernels-a12-5-10:
    name: "5.10.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "66"
            os_patch_level: "2022-01"
            revision: "r11"
          - sub_level: "81"
            os_patch_level: "2022-03"
            revision: "r11"
          - sub_level: "101"
            os_patch_level: "2022-04"
            revision: "r28"
          - sub_level: "110"
            os_patch_level: "2022-07"
            revision: "r1"
          - sub_level: "117"
            os_patch_level: "2022-09"
            revision: "r1"
          - sub_level: "136"
            os_patch_level: "2022-11"
            revision: "r15"
          - sub_level: "149"
            os_patch_level: "2023-01"
            revision: "r1"
          - sub_level: "160"
            os_patch_level: "2023-03"
            revision: "r1"
          - sub_level: "168"
            os_patch_level: "2023-04"
            revision: "r9"
          - sub_level: "177"
            os_patch_level: "2023-07"
            revision: "r3"
          - sub_level: "185"
            os_patch_level: "2023-09"
            revision: "r1"
          - sub_level: "198"
            os_patch_level: "2024-01"
            revision: "r17"
          - sub_level: "205"
            os_patch_level: "2024-03"
            revision: "r1"
          - sub_level: "209"
            os_patch_level: "2024-05"
            revision: "r13"
          - sub_level: "218"
            os_patch_level: "2024-08"
            revision: "r14"
          - sub_level: "226"
            os_patch_level: "2024-11"
            revision: "r8"
          - sub_level: "233"
            os_patch_level: "2025-02"
            revision: "r1"
          - sub_level: "236"
            os_patch_level: "2025-05"
            revision: "r1"
          - sub_level: "237"
            os_patch_level: "2025-06"
            revision: "r1"
          - sub_level: "240"
            os_patch_level: "2025-09"
            revision: "r1"
          - sub_level: "246"
            os_patch_level: "2025-12"
            revision: "r1"
          - sub_level: "X"
            os_patch_level: "lts"
            revision: "r1"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android12"
      kernel_version: "5.10"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      revision: ${{ matrix.revision }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      ksu_branch: ${{ inputs.kernelsu_branch }}
      custom_ref: ${{ inputs.custom_ref || '' }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_ddk: ${{ inputs.use_ddk }}
      use_ntsync: ${{ inputs.use_ntsync }}
      use_networking: ${{ inputs.use_networking }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: false
      enable_susfs: ${{ !inputs.cancel_susfs }}
      virtualization_support: ${{ inputs.virtualization_support || 'off' }}
      zram_full_algo: ${{ inputs.zram_full_algo || false }}
      zram_extra_algos: ${{ inputs.zram_extra_algos || '' }}
      kpm_password: ${{ inputs.kpm_password || '' }}
      use_custom_external_modules: ${{ inputs.use_custom_external_modules || false }}
      custom_external_modules: ${{ inputs.custom_external_modules || '' }}
      upload_aux_artifacts: false

  # 仅在直接触发时运行，从 main.yml 调用时跳过
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      ksu_branch: ${{ inputs.kernelsu_branch }}
      custom_ref: ${{ inputs.custom_ref || '' }}
