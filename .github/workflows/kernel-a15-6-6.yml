name: 内核构建 - Android 15 (6.6)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_variant:
        description: "KernelSU 变体"
        required: true
        type: choice
        options:
          - Official
          #- Next
          - SukiSU
          - ReSukiSU
        default: ReSukiSU
      kernelsu_branch:
        description: "KSU 分支"
        required: true
        type: choice
        options:
          - Stable(标准)
          - Dev(开发)
          - Other(其他/指定)
        default: Stable(标准)
      version:
        description: "自定义版本名 (可选)"
        required: false
        type: string
      build_time:
        description: "自定义构建时间 (可选，N或留空=当前UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      droidspaces:
        description: "Droidspaces 容器支持"
        required: false
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      use_zram:
        description: "启用 ZRAM 增强算法"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "启用 BBG 防格机"
        required: true
        type: boolean
        default: false
      use_ddk:
        description: "启用 DDK 防格机 LSM"
        required: true
        type: boolean
        default: false
      use_kpm:
        description: "启用 KPM 功能"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "启用 Re-Kernel 驱动"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "禁用 SUSFS"
        required: true
        type: boolean
        default: false
      supp_op:
        description: "启用一加 8E 支持"
        required: false
        type: boolean
        default: false
      zram_full_algo:
        description: "启用 ZRAM 完整算法支持（LZO/LZ4/LZ4HC/LZ4K/LZ4KD/DEFLATE/842/ZSTD，默认 lzo-rle）"
        required: false
        type: boolean
        default: false
      zram_extra_algos:
        description: "自定义 ZRAM 算法（逗号分隔，如 lzo,lz4,deflate,zstd；仅在未启用完整算法时生效）"
        required: false
        type: string
        default: ""
      kpm_password:
        description: "自定义 KPM 超级密码（留空=使用默认密码）"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      kernelsu_variant:
        required: true
        type: string
      kernelsu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      use_ddk:
        required: false
        type: boolean
        default: false
      use_kpm:
        required: true
        type: boolean
        default: false
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      supp_op:
        required: false
        type: boolean
      droidspaces:
        required: false
        type: string
        default: "off"
      zram_full_algo:
        required: false
        type: boolean
        default: false
      zram_extra_algos:
        required: false
        type: string
        default: ""
      kpm_password:
        required: false
        type: string
        default: ""
      called_from_main:
        description: "是否从 main.yml 调用（内部使用）"
        required: false
        type: boolean
        default: false

jobs:
  build-kernels-a15-6-6:
    name: "6.6.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "50"
            os_patch_level: "2024-10"
          - sub_level: "56"
            os_patch_level: "2024-11"
          - sub_level: "57"
            os_patch_level: "2024-12"
          - sub_level: "58"
            os_patch_level: "2025-01"
          - sub_level: "66"
            os_patch_level: "2025-02"
          - sub_level: "77"
            os_patch_level: "2025-03"
          - sub_level: "82"
            os_patch_level: "2025-04"
          - sub_level: "87"
            os_patch_level: "2025-05"
          - sub_level: "89"
            os_patch_level: "2025-06"
          - sub_level: "92"
            os_patch_level: "2025-07"
          - sub_level: "98"
            os_patch_level: "2025-09"
          - sub_level: "102"
            os_patch_level: "2025-10"
          - sub_level: "118"
            os_patch_level: "2026-01"
          - sub_level: "127"
            os_patch_level: "2026-04"
          - sub_level: "X"
            os_patch_level: "lts"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android15"
      kernel_version: "6.6"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_ddk: ${{ inputs.use_ddk }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: ${{ inputs.supp_op || false }}
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}
      zram_full_algo: ${{ inputs.zram_full_algo || false }}
      zram_extra_algos: ${{ inputs.zram_extra_algos || '' }}
      kpm_password: ${{ inputs.kpm_password || '' }}

  # 仅在直接触发时运行，从 main.yml 调用时跳过
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
