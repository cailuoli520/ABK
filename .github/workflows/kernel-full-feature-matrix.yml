name: 全属性内核构建矩阵

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_variant:
        description: "KernelSU 变体"
        required: true
        type: choice
        options:
          - ReSukiSU
          - SukiSU
        default: ReSukiSU
      kernelsu_branch:
        description: "KSU 分支"
        required: true
        type: choice
        options:
          - Stable(标准)
          - Dev(开发)
          - Other(其他/指定)
        default: Dev(开发)
      version:
        description: "自定义版本名 (可选)"
        required: false
        type: string
        default: ""
      build_time:
        description: "自定义构建时间 (可选，N或留空=当前UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      kpm_password:
        description: "自定义 KPM 超级密码（留空=使用默认密码）"
        required: false
        type: string
        default: ""

jobs:
  prepare-matrix:
    name: 准备内核小版本矩阵
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.kernel-matrix.outputs.matrix }}
      count: ${{ steps.kernel-matrix.outputs.count }}
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v6

      - name: 生成矩阵
        id: kernel-matrix
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import re
          from collections import Counter
          from pathlib import Path

          build_yml = Path(".github/workflows/build.yml").read_text(encoding="utf-8")
          match = re.search(
              r"KNOWN_KERNEL_PAIRS=\$\(cat <<'EOF'\n(.*?)\n\s*EOF\n\s*\)",
              build_yml,
              re.S,
          )
          if not match:
              raise SystemExit("KNOWN_KERNEL_PAIRS block not found in build.yml")

          latest = {}
          for raw_line in match.group(1).splitlines():
              line = raw_line.strip()
              if not line:
                  continue
              parts = line.split()
              if len(parts) != 4:
                  continue

              android_version, kernel_version, sub_level, os_patch_level = parts
              if sub_level == "X" or os_patch_level == "lts":
                  continue

              row = {
                  "android_version": android_version,
                  "kernel_version": kernel_version,
                  "sub_level": sub_level,
                  "os_patch_level": os_patch_level,
              }
              key = (android_version, kernel_version, sub_level)
              if key not in latest or os_patch_level > latest[key]["os_patch_level"]:
                  latest[key] = row

          android_order = {
              "android12": 12,
              "android13": 13,
              "android14": 14,
              "android15": 15,
              "android16": 16,
          }

          def version_key(value):
              return tuple(int(part) for part in value.split("."))

          def sort_key(row):
              return (
                  android_order.get(row["android_version"], 999),
                  version_key(row["kernel_version"]),
                  int(row["sub_level"]),
              )

          matrix = sorted(latest.values(), key=sort_key)
          matrix_json = json.dumps({"include": matrix}, separators=(",", ":"))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={matrix_json}\n")
              output.write(f"count={len(matrix)}\n")

          counts = Counter(f'{row["android_version"]}-{row["kernel_version"]}' for row in matrix)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## 全属性内核构建矩阵\n\n")
              summary.write(f"- 总任务数: {len(matrix)}\n")
              summary.write("- Droidspaces: off\n")
              summary.write("- 自定义外部模块: off\n")
              summary.write("- Android16/6.12: ZRAM off\n")
              summary.write("- LTS: 已排除\n\n")
              for combo in sorted(counts):
                  summary.write(f"- {combo}: {counts[combo]}\n")

          print(matrix_json)
          PY

  build-full-feature-matrix:
    name: "${{ matrix.kernel_version }}.${{ matrix.sub_level }}-${{ matrix.android_version }}-${{ matrix.os_patch_level }}"
    needs: prepare-matrix
    if: ${{ needs.prepare-matrix.outputs.count != '0' }}
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: ${{ matrix.android_version }}
      kernel_version: ${{ matrix.kernel_version }}
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ matrix.kernel_version != '6.12' }}
      use_bbg: true
      use_ddk: true
      use_kpm: true
      use_rekernel: true
      enable_susfs: true
      supp_op: true
      droidspaces: "off"
      zram_full_algo: ${{ matrix.kernel_version != '6.12' }}
      zram_extra_algos: ""
      kpm_password: ${{ inputs.kpm_password || '' }}
      use_custom_external_modules: false
      custom_external_modules: ""

  release-full-feature-matrix:
    name: 发布全属性矩阵产物
    needs:
      - prepare-matrix
      - build-full-feature-matrix
    if: ${{ needs.prepare-matrix.outputs.count != '0' && needs.build-full-feature-matrix.result == 'success' && github.repository == 'xingguangcuican6666/ABK' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v6

      - name: 下载矩阵构建产物
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts

      - name: 准备 Release 元数据
        shell: bash
        run: |
          set -euo pipefail

          release_tag="full-feature-${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          release_title="AnyBase Kernel 全属性矩阵 ${{ inputs.kernelsu_variant }} #${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          find ./downloaded-artifacts -type f \
            \( -name '*AnyKernel3.zip' -o -name '*.img' \) \
            ! -path '*-Rejects/*' \
            | sort > release_assets.txt

          asset_count="$(wc -l < release_assets.txt | tr -d '[:space:]')"
          if [ "$asset_count" -eq 0 ]; then
            echo "::error::未找到可发布的内核产物。"
            find ./downloaded-artifacts -maxdepth 3 -type f -print || true
            exit 1
          fi

          cat > release_body.md << EOF
          ## AnyBase Kernel 全属性矩阵构建

          全量矩阵已全部构建成功，本 Release 自动发布本次 workflow run 的所有内核产物。

          | 项目 | 内容 |
          |:---|:---|
          | KernelSU 变体 | ${{ inputs.kernelsu_variant }} |
          | KernelSU 分支 | ${{ inputs.kernelsu_branch }} |
          | 自定义版本名 | ${{ inputs.version || '未设置' }} |
          | 构建时间 | ${{ inputs.build_time || '当前 UTC' }} |
          | 矩阵任务数 | ${{ needs.prepare-matrix.outputs.count }} |
          | BBG | 开启 |
          | DDK LSM | 开启 |
          | KPM | 开启 |
          | Re-Kernel | 开启 |
          | SUSFS | 开启 |
          | Droidspaces | off |
          | 自定义外部模块 | off |
          | Android16 / 6.12 ZRAM | off |

          ### 下载说明

          Assets 中包含每个内核小版本对应的 AnyKernel3 刷入包和 boot 镜像。

          > 刷写内核有变砖风险。刷入前请备份原厂 boot / vendor_boot 等镜像，并确认设备、Android 版本、内核版本和补丁级别匹配。
          EOF

          {
            echo "RELEASE_TAG=$release_tag"
            echo "RELEASE_TITLE=$release_title"
            echo "ASSET_COUNT=$asset_count"
          } >> "$GITHUB_ENV"

      - name: 创建 GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          gh release create "$RELEASE_TAG" \
            --repo "$REPO" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes-file release_body.md

      - name: 上传 Release 产物
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            [ -f "$file" ] || continue
            echo "上传 $file"
            gh release upload "$RELEASE_TAG" "$file" --repo "$REPO" --clobber
          done < release_assets.txt

      - name: 发布摘要
        shell: bash
        run: |
          {
            echo "## 全属性矩阵 Release 已创建"
            echo "- Release: https://github.com/$REPO/releases/tag/$RELEASE_TAG"
            echo "- 产物数量: $ASSET_COUNT"
            echo "- 矩阵任务数: ${{ needs.prepare-matrix.outputs.count }}"
          } >> "$GITHUB_STEP_SUMMARY"
